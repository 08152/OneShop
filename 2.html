<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Account</title>


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}


body{

background:#fff3e6;
height:100vh;
display:flex;
align-items:center;
justify-content:center;

}



.box{

background:white;
width:350px;
padding:30px;
border-radius:20px;
box-shadow:0 5px 20px #aaa;
text-align:center;

}



h1{

color:#ff8c00;
margin-bottom:20px;

}



input{

width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;

}



button{

width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:#ff8c00;
color:white;
font-size:17px;
cursor:pointer;

}



.switch{

margin-top:20px;
color:#ff8c00;
cursor:pointer;

}



.back{

position:absolute;
top:20px;
left:20px;
background:#ff8c00;
color:white;
padding:12px;
border-radius:50%;
cursor:pointer;

}


</style>

</head>


<body>



<div class="back" onclick="back()">
⬅
</div>




<div class="box">


<h1 id="title">
Anmelden
</h1>



<input id="mail" placeholder="E-Mail">


<input id="pin" type="password" placeholder="PIN">



<input id="pin2" type="password" placeholder="PIN wiederholen" style="display:none;">



<button onclick="next()">
Weiter
</button>



<div class="switch" onclick="changeMode()">

Account erstellen

</div>



</div>





<script>


let create=false;



function changeMode(){


create=!create;


if(create){


document.getElementById("title").innerHTML=
"Account erstellen";


document.getElementById("pin2").style.display=
"block";


document.querySelector(".switch").innerHTML=
"Ich habe schon einen Account";


}

else{


document.getElementById("title").innerHTML=
"Anmelden";


document.getElementById("pin2").style.display=
"none";


document.querySelector(".switch").innerHTML=
"Account erstellen";


}


}




function next(){


let mail=
document.getElementById("mail").value;


let pin=
document.getElementById("pin").value;



if(create){


let pin2=
document.getElementById("pin2").value;



if(pin!==pin2){

alert("PINs stimmen nicht überein!");

return;

}



if(mail==="" || pin===""){

alert("Bitte alles ausfüllen!");

return;

}



localStorage.setItem(
"accountMail",
mail
);


localStorage.setItem(
"accountPin",
pin
);



alert("Account erstellt!");



localStorage.setItem(
"loggedIn",
"true"
);



window.location.href=
"index.html";



}

else{



let savedMail=
localStorage.getItem("accountMail");


let savedPin=
localStorage.getItem("accountPin");



if(mail===savedMail && pin===savedPin){



localStorage.setItem(
"loggedIn",
"true"
);



alert("Erfolgreich angemeldet!");

window.location.href=
"index.html";



}

else{


alert("Falsche Mail oder PIN!");

}


}



}



function back(){

window.location.href="index.html";

}



</script>



</body>

</html>
