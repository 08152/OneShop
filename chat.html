<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Velo KI</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial,sans-serif;
height:100vh;
display:flex;
background:white;
}


/* links */

.sidebar{

width:260px;
border-right:1px solid #ddd;
padding:15px;

}


.logo{

font-size:24px;
font-weight:bold;
margin-bottom:20px;

}


button{

border:none;
background:#000;
color:white;
padding:12px;
border-radius:10px;
cursor:pointer;

}


.chat{

margin-top:20px;
background:#eee;
padding:12px;
border-radius:10px;

}



/* rechts */

.main{

flex:1;
display:flex;
flex-direction:column;

}


.header{

padding:18px;
border-bottom:1px solid #ddd;
font-size:22px;
font-weight:bold;

}


#chat{

flex:1;
overflow:auto;
padding:20px;

}


.msg{

padding:12px;
margin:10px 0;
border-radius:12px;
max-width:70%;

}


.user{

background:#eee;
margin-left:auto;

}


.velo{

background:#f7f7f7;

}


.bottom{

display:flex;
padding:15px;
border-top:1px solid #ddd;

}


input{

flex:1;
padding:14px;
border:1px solid #ccc;
border-radius:10px;

}


.send{

margin-left:10px;

}

</style>

</head>


<body>



<div class="sidebar">

<div class="logo">
🤖 Velo
</div>


<button onclick="neuerChat()">
+ Neuer Chat
</button>


<div class="chat">
Chat 1
</div>


</div>





<div class="main">


<div class="header">
Velo
</div>


<div id="chat">

<div class="msg velo">
Hallo! Ich bin Velo.
</div>

</div>




<div class="bottom">

<input id="eingabe" placeholder="Nachricht an Velo...">

<button class="send" onclick="senden()">
Senden
</button>

</div>


</div>




<script>


let grundwissen=[];

let wortwissen=[];

let memory=[];



// 1.json laden

fetch("1.json")
.then(r=>r.json())
.then(data=>{

grundwissen=data.knowledge;

});



// 2.json laden

fetch("2.json")
.then(r=>r.json())
.then(data=>{

wortwissen=data.words;

});



// Memory laden

fetch("/api/data")
.then(r=>r.json())
.then(data=>{

memory=data.memory || [];

});





function senden(){


let feld=document.getElementById("eingabe");

let text=feld.value.trim();


if(text=="") return;


anzeigen("Du: "+text,"user");



let antwort=denken(text);



anzeigen("Velo: "+antwort,"velo");


feld.value="";


}





function denken(text){


let klein=text.toLowerCase();


// 1.json durchsuchen

for(let thema of grundwissen){


for(let wort of thema.keywords){


if(klein.includes(wort)){


let a=thema.concepts;


return a[Math.floor(Math.random()*a.length)];


}

}

}



// 2.json Wörter prüfen

let gefundene=[];


for(let wort of wortwissen){


if(klein.includes(wort.word)){


gefundene.push(wort.meaning);


for(let c of wort.connections){


if(klein.includes(c.word)){

gefundene.push(c.meaning);

}

}


}

}



if(gefundene.length>0){

return gefundene.join(" ");

}





// Memory prüfen

for(let m of memory){


if(klein.includes(m.question.toLowerCase())){

return m.answer;

}

}




return "Das muss ich noch lernen.";

}






function anzeigen(text,klasse){


let chat=document.getElementById("chat");


let div=document.createElement("div");


div.className="msg "+klasse;


div.innerText=text;


chat.appendChild(div);


chat.scrollTop=chat.scrollHeight;


}





function neuerChat(){


document.getElementById("chat").innerHTML=

`
<div class="msg velo">
Neuer Chat gestartet.<br>
Hallo! Ich bin Velo.
</div>
`;

}




document.getElementById("eingabe")
.addEventListener("keydown",function(e){

if(e.key==="Enter"){

senden();

}

});


</script>


</body>
</html>
