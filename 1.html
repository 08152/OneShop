<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Einkaufswagen</title>


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}


body{
background:#fff3e6;
}



/* Kopf */

header{

height:80px;
background:#ff8c00;
display:flex;
align-items:center;
gap:20px;
padding:15px;
color:white;
font-size:25px;
font-weight:bold;

}


/* Zurück */

.back{

width:45px;
height:45px;
background:white;
color:#ff8c00;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;

}




main{

padding:30px;

}



.item{

background:white;
margin:15px 0;
padding:20px;
border-radius:15px;
display:flex;
align-items:center;
justify-content:space-between;
box-shadow:0 3px 10px #ccc;

}



.name{

font-size:22px;
font-weight:bold;

}



.amount{

font-size:18px;

}



.remove{

background:red;
color:white;
border:none;
width:40px;
height:40px;
border-radius:50%;
font-size:20px;
cursor:pointer;

}



.empty{

text-align:center;
font-size:25px;
margin-top:50px;

}


</style>


</head>



<body>


<header>


<div class="back" onclick="back()">
⬅
</div>


🛒 Einkaufswagen


</header>




<main>


<h1>
Deine Artikel
</h1>


<div id="cart"></div>


</main>




<script>


function loadCart(){


let cart =
JSON.parse(localStorage.getItem("cart")) || [];


let box =
document.getElementById("cart");


box.innerHTML="";



if(cart.length===0){


box.innerHTML=
`
<div class="empty">
Dein Einkaufswagen ist leer 🛒
</div>
`;

return;

}




cart.forEach((item,index)=>{


let div=document.createElement("div");


div.className="item";



div.innerHTML=

`

<div class="name">
${item.name}
</div>


<div class="amount">
Anzahl: ${item.amount}
</div>


<button class="remove" onclick="removeItem(${index})">
✖
</button>


`;



box.appendChild(div);



});



}




function removeItem(index){


let cart =
JSON.parse(localStorage.getItem("cart")) || [];


cart.splice(index,1);


localStorage.setItem(
"cart",
JSON.stringify(cart)
);


loadCart();


}




function back(){

window.location.href="index.html";

}



loadCart();


</script>


</body>
</html>
