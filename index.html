<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fake Hacker Terminal</title>
<style>
html,body{margin:0;height:100%;background:#000;color:#00ff66;font:16px Consolas,monospace}
#term{height:calc(100% - 44px);overflow:auto;padding:12px;white-space:pre-wrap}
#bar{display:flex;border-top:1px solid #0f5;padding:10px}
#typed{flex:1}
#cursor{animation:blink 1s step-end infinite}
@keyframes blink{50%{opacity:0}}
#status{position:fixed;top:10px;right:10px;border:1px solid #0f5;padding:6px}
</style>
</head>
<body>
<div id="status">SCHREIBSCHUTZ AKTIV</div>
<div id="term">Fake Hacker Terminal
Nur Simulation – keine echten Hackerfunktionen.

Drücke STRG, gib den PIN "Risky_Live" ein und bestätige mit Enter.
</div>
<div id="bar"><span>guest@terminal:~$&nbsp;</span><span id="typed"></span><span id="cursor">█</span></div>
<script>
const out=document.getElementById("term");
const typed=document.getElementById("typed");
const status=document.getElementById("status");
let unlocked=false,pinMode=false,pin="",cmd="";
function log(t){out.textContent+="\n"+t;out.scrollTop=out.scrollHeight;}
document.addEventListener("keydown",e=>{
 if(e.key==="Control"){pinMode=true;pin="";typed.textContent="";return;}
 if(pinMode){
   e.preventDefault();
   if(e.key==="Enter"){if(pin==="Risky_Live"){unlocked=true;status.textContent="SCHREIBEN ERLAUBT";log("[SYSTEM] Zugriff gewährt.");}else{log("[SYSTEM] Falscher PIN.");}pinMode=false;typed.textContent="";return;}
   if(e.key==="Backspace"){pin=pin.slice(0,-1);typed.textContent="*".repeat(pin.length);return;}
   if(e.key.length===1){pin+=e.key;typed.textContent="*".repeat(pin.length);}
   return;
 }
 if(!unlocked)return;
 if(e.key==="Backspace"){cmd=cmd.slice(0,-1);typed.textContent=cmd;return;}
 if(e.key==="Enter"){log("guest@terminal:~$ "+cmd);cmd="";typed.textContent="";return;}
 if(e.key.length===1){cmd+=e.key;typed.textContent=cmd;}
});
</script>
</body>
</html>
