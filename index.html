<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Chat</title>
    <style>
        body {
            margin: 0;
            background: #111;
            color: #0f0;
            font-family: monospace;
        }
        #log {
            height: 90vh;
            overflow: auto;
            padding: 10px;
            box-sizing: border-box;
        }
        input {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            background: #000;
            color: #0f0;
            border: none;
            outline: none;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <div id="log"></div>
    <input id="input" placeholder="PIN oder Nachricht eingeben..." autofocus>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const s = io();
        const l = document.getElementById('log');
        const i = document.getElementById('input');
        
        let ok = false;

        // Hilfsfunktionen für LocalStorage offline-Warteschlange
        const getOfflineQueue = () => JSON.parse(localStorage.getItem('chat_offline_queue') || '[]');
        const saveOfflineQueue = q => localStorage.setItem('chat_offline_queue', JSON.stringify(q));

        const add = t => {
            l.innerHTML += t + '<br>';
            l.scrollTop = l.scrollHeight;
        };

        // Event: Verbindung zum Server wiederhergestellt
        s.on('connect', () => {
            const queue = getOfflineQueue();
            if (queue.length > 0) {
                add(`[System] Reconnected. Sende ${queue.length} gespeicherte Nachricht(en)...`);
                queue.forEach(msg => s.emit('line', msg));
                saveOfflineQueue([]); // Warteschlange leeren
            }
        });

        s.on('history', h => {
            l.innerHTML = '';
            h.forEach(add);
        });

        s.on('line', add);

        i.onkeydown = e => {
            if (e.key !== 'Enter') return;
            
            let t = i.value.trim();
            i.value = '';

            if (!ok) {
                if (t === 'Risky_Live') {
                    ok = true;
                    add('[PIN akzeptiert] - Sie können jetzt Nachrichten senden.');
                    i.placeholder = 'Nachricht schreiben...';
                } else {
                    add('[System] Falsche PIN. Zugriff verweigert.');
                }
                return;
            }

            if (t) {
                // Prüfen, ob der Server aktuell erreichbar ist
                if (s.connected) {
                    s.emit('line', t);
                } else {
                    // Offline: Im LocalStorage zwischenspeichern und lokal anzeigen
                    const queue = getOfflineQueue();
                    queue.push(t);
                    saveOfflineQueue(queue);
                    add('[Offline-Gespeichert] ' + t);
                }
            }
        };
    </script>
</body>
</html>
