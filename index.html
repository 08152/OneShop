<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GhostShop</title>

<style>
*{
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    margin:0;
    background:#f3f3f3;
}

/* Kopf */
header{
    background:#131921;
    color:white;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:#ffd814;
}

.cartIcon{
    cursor:pointer;
    font-size:28px;
}


/* Produkte */

.container{
    padding:30px;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}


.product{
    background:white;
    border-radius:15px;
    padding:20px;
    box-shadow:0 5px 15px #ccc;
    text-align:center;
}


.product img{
    width:150px;
    height:150px;
    object-fit:contain;
}


.price{
    font-size:22px;
    color:#b12704;
    font-weight:bold;
}


button{
    border:0;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
    background:#ffd814;
    font-weight:bold;
}


button:hover{
    background:#ffca00;
}


/* Warenkorb */

.cartMenu{

    position:fixed;
    right:-400px;
    top:0;

    width:350px;
    height:100%;

    background:white;

    box-shadow:-5px 0 20px #999;

    padding:20px;

    transition:.3s;

    overflow:auto;
}


.cartMenu.open{
    right:0;
}


.cartItem{

    border-bottom:1px solid #ddd;
    padding:10px;

}


.close{
    float:right;
    cursor:pointer;
    font-size:25px;
}



/* Admin */

.admin{

    display:none;

    padding:30px;

    background:white;

    margin:20px;

    border-radius:15px;

}


.order{

    background:#eee;
    padding:15px;

    margin:10px;

    border-radius:10px;

}


</style>

</head>


<body>


<header>

<div class="logo">
GhostShop
</div>


<div class="cartIcon" onclick="openCart()">
🛒
</div>


</header>



<div class="container">

<h1>Artikel</h1>

<div class="products" id="products"></div>


</div>



<!-- Warenkorb -->

<div class="cartMenu" id="cart">


<span class="close" onclick="closeCart()">✖</span>


<h2>Warenkorb</h2>


<div id="cartItems"></div>


<h3>
Gesamt:
<span id="total">0</span> €
</h3>


<button onclick="order()">
Jetzt bestellen
</button>


</div>



<!-- Bestellungen -->

<div class="admin" id="admin">


<h1>
Bestellungen
</h1>


<div id="orders"></div>


</div>
<script>


/*
Neue Artikel hinzufügen:

einfach neue Zeile kopieren:

{
name:"Artikel",
price:1.00,
img:"BILD"
}

*/


let products=[


{
name:"Weihenstephan H-Milch 1L",
price:1.40,
img:"https://www.molkerei-weihenstephan.de/fileadmin/media/produkte/milch/haltbare_milch/hmilch_1l_35.png"
}


];



let cart=[];


let orders=[];



function loadProducts(){

let area=document.getElementById("products");

area.innerHTML="";


products.forEach((p,i)=>{


area.innerHTML+=`

<div class="product">

<img src="${p.img}">

<h2>${p.name}</h2>

<p class="price">
${p.price.toFixed(2)} €
</p>


<button onclick="add(${i})">
In den Warenkorb
</button>


</div>

`;


});


}


function add(i){

cart.push(products[i]);

updateCart();

}


function updateCart(){

let box=document.getElementById("cartItems");

box.innerHTML="";


let sum=0;


cart.forEach(p=>{


sum+=p.price;


box.innerHTML+=`

<div class="cartItem">

${p.name}<br>

${p.price.toFixed(2)} €

</div>

`;


});


document.getElementById("total").innerHTML=sum.toFixed(2);


}



function openCart(){

document.getElementById("cart").classList.add("open");

}



function closeCart(){

document.getElementById("cart").classList.remove("open");

}




function order(){


if(cart.length==0){

alert("Warenkorb leer");

return;

}


let text="";


cart.forEach(p=>{

text+=p.name+"<br>";

});


orders.push({

date:new Date().toLocaleString(),

items:text,

price:document.getElementById("total").innerHTML

});



alert("Bestellung erstellt");


printReceipt();



cart=[];

updateCart();


}



function printReceipt(){


let w=window.open();


w.document.write(`

<h1>Rechnung</h1>

${document.getElementById("cartItems").innerHTML}

<h2>
Gesamt: ${document.getElementById("total").innerHTML} €
</h2>

`);


w.print();


}





document.addEventListener("keydown",function(e){


if(e.ctrlKey){


let pin=prompt("PIN eingeben");


if(pin=="0123"){


document.getElementById("admin").style.display="block";

showOrders();


}

}


});




function showOrders(){

let box=document.getElementById("orders");

box.innerHTML="";


orders.forEach((o,i)=>{


box.innerHTML+=`

<div class="order">


<b>${o.date}</b>

<p>
${o.items}
</p>


Preis:
${o.price} €


<br><br>


<button onclick="printOrder(${i})">
Ausdrucken
</button>


<button onclick="deleteOrder(${i})">
Erledigen
</button>


</div>


`;


});


}
function deleteOrder(i){

orders.splice(i,1);

showOrders();

}




function printOrder(i){


let o=orders[i];


let w=window.open();


w.document.write(`

<h1>Einkaufszettel</h1>

${o.items}

`);

w.print();


}



// NEU: Rechnung drucken

function printInvoice(i){


let o=orders[i];


let w=window.open();


w.document.write(`

<!DOCTYPE html>

<html>

<head>

<title>GhostShop Rechnung</title>


<style>

body{

font-family:Arial;

padding:40px;

}


h1{

font-size:35px;

}


.box{

border:1px solid #aaa;

padding:20px;

border-radius:10px;

}


</style>


</head>


<body>


<h1>
GhostShop Rechnung
</h1>


<div class="box">


<b>Datum:</b>

${o.date}


<br><br>


<h2>
Artikel:
</h2>


${o.items}


<h2>
Gesamt:
${o.price} €
</h2>


<br>


Vielen Dank für Ihren Einkauf!


</div>


</body>

</html>

`);


w.print();


}




loadProducts();


</script>


</body>

</html>
