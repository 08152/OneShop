<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mecha Chameleon</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="game"></div>

<!-- Pose-Menü -->
<div id="poseMenu" class="menu hidden">
    <h2>Posen</h2>

    <button id="poseStand">
        Stehen
    </button>

    <button id="poseLie">
        Liegen
    </button>

    <button id="poseHead">
        Kopfstand
    </button>
</div>

<!-- Mal-Menü -->
<div id="paintMenu" class="menu hidden">

    <h2>Malen</h2>

    <input
        type="color"
        id="paintColor"
        value="#ff0000">

    <br><br>

    <input
        type="range"
        id="brushSize"
        min="2"
        max="50"
        value="10">

    <p>Pinselgröße</p>

    <button id="clearPaint">
        Bemalung löschen
    </button>

</div>

<!-- HUD -->
<div id="hud">

    <div id="info">
        WASD = Laufen<br>
        Maus = Kamera<br>
        Leertaste = Springen<br>
        1 = Pose-Menü<br>
        2 = Mal-Menü
    </div>

</div>

<!-- Bibliotheken -->
<script src="https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.min.js"></script>

<!-- Eigene Dateien -->
<script src="player.js"></script>
<script src="camera.js"></script>
<script src="pose.js"></script>
<script src="paint.js"></script>
<script src="ui.js"></script>

</body>
</html>
