<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Orange Shop</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#fff3e6;
}

/* Kopfbereich */
header{
    height:80px;
    background:#ff8c00;
    display:flex;
    align-items:center;
    padding:15px 25px;
    gap:20px;
    box-shadow:0 3px 10px #999;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:white;
}

/* Suchleiste */
.search-box{
    flex:1;
    display:flex;
}

.search-box input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px 0 0 10px;
    font-size:16px;
    outline:none;
}

.search-box button{
    border:none;
    background:#e66f00;
    color:white;
    padding:0 20px;
    cursor:pointer;
    border-radius:0 10px 10px 0;
    font-size:18px;
}

/* Symbole */
.icons{
    display:flex;
    gap:15px;
}

.icon{
    width:45px;
    height:45px;
    background:white;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:24px;
    cursor:pointer;
}

/* Inhalt */
main{
    padding:30px;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:15px;
    padding:20px;
    box-shadow:0 3px 10px #ccc;
    transition:0.2s;
}

.card:hover{
    transform:scale(1.03);
}

.card h2{
    color:#ff8c00;
}

.card button{
    margin-top:15px;
    background:#ff8c00;
    color:white;
    border:none;
    padding:10px;
    border-radius:8px;
    cursor:pointer;
}

/* Mobil */
@media(max-width:600px){
    header{
        flex-wrap:wrap;
        height:auto;
    }

    .logo{
        width:100%;
    }
}
</style>

</head>

<body>

<header>

<div class="logo">
🟧 OrangeShop
</div>

<div class="search-box">
<input id="search" placeholder="Suchen...">
<button onclick="searchProducts()">🔎</button>
</div>

<div class="icons">
<div class="icon" onclick="account()">👤</div>
<div class="icon" onclick="cart()">🛒</div>
</div>

</header>


<main>

<h1>Produkte</h1>

<br>

<div class="products" id="products">

<div class="card">
<h2>Orange Handy</h2>
<p>Ein modernes Smartphone.</p>
<button>Kaufen</button>
</div>


<div class="card">
<h2>Kopfhörer</h2>
<p>Guter Klang für Musik.</p>
<button>Kaufen</button>
</div>


<div class="card">
<h2>Tastatur</h2>
<p>Gaming Tastatur.</p>
<button>Kaufen</button>
</div>


<div class="card">
<h2>Maus</h2>
<p>Präzise Gaming Maus.</p>
<button>Kaufen</button>
</div>

</div>

</main>


<script>

function searchProducts(){

let input=document.getElementById("search").value.toLowerCase();

let cards=document.querySelectorAll(".card");

cards.forEach(card=>{

let text=card.innerText.toLowerCase();

if(text.includes(input)){
    card.style.display="block";
}
else{
    card.style.display="none";
}

});

}


function account(){
alert("Account geöffnet 👤");
}


function cart(){
alert("Einkaufswagen geöffnet 🛒");
}

</script>


</body>
</html>
