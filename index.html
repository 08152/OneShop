<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Infinite Model Game</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; background: white; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; opacity: 0.5; }
        #instructions { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; text-align: center; background: rgba(0,0,0,0.7); padding: 20px; border-radius: 10px; cursor: pointer; }
    </style>
    <!-- Three.js und GLTFLoader via CDN -->
    <script src="https://cloudflare.com"></script>
    <script src="https://jsdelivr.net"></script>
</head>
<body>

    <div id="crosshair"></div>
    <div id="instructions">
        <h1>Klicke zum Spielen</h1>
        <p>W, A, S, D = Bewegen<br>Maus = Umsehen<br>ESC = Pause</p>
    </div>

    <script>
        // --- CONFIGURATION ---
        const CHUNK_SIZE = 100;       // Größe eines quadratischen Chunks
        const RENDER_DISTANCE = 2;   // Wie viele Chunks in jede Richtung laden (2 = 5x5 Chunks Sichtweite)
        const MODELS_PER_CHUNK = 15;  // Wie viele Modell-Kopien pro Chunk platziert werden
        const MOVE_SPEED = 30;       // Bewegungsgeschwindigkeit des Spielers

        // --- GAME STATE ---
        let scene, camera, renderer, clock;
        let originalModelMesh = null;
        let activeChunks = new Map(); // Speichert geladene Chunks: "x,z" -> InstancedMesh
        
        // Controls state
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let yaw = 0, pitch = 0;
        const player = { pos: new THREE.Vector3(0, 2, 0) }; // Startposition (Y=2 ist Augenhöhe)

        const instructions = document.getElementById('instructions');

        // --- POINTER LOCK (Mausfang) ---
        instructions.addEventListener('click', () => {
            document.body.requestPointerLock();
        });

        document.addEventListener('pointerlockchange', () => {
            if (document.pointerLockElement === document.body) {
                instructions.style.display = 'none';
            } else {
                instructions.style.display = 'block';
            }
        });

        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement !== document.body) return;
            yaw -= e.movementX * 0.002;
            pitch -= e.movementY * 0.002;
            pitch = Math.max(-Math.PI / 2.5, Math.min(Math.PI / 2.5, pitch)); // Blickwinkel limitieren
        });

        // --- KEYBOARD CONTROLS ---
        const onKeyDown = (e) => {
            switch (e.code) {
                case 'KeyW': moveForward = true; break;
                case 'KeyS': moveBackward = true; break;
                case 'KeyA': moveLeft = true; break;
                case 'KeyD': moveRight = true; break;
            }
        };
        const onKeyUp = (e) => {
            switch (e.code) {
                case 'KeyW': moveForward = false; break;
                case 'KeyS': moveBackward = false; break;
                case 'KeyA': moveLeft = false; break;
                case 'KeyD': moveRight = false; break;
            }
        };
        document.addEventListener('keydown', onKeyDown);
        document.addEventListener('keyup', onKeyUp);

        // --- INITIALIZATION ---
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb); // Himmelblau
            scene.fog = new THREE.FogExp2(0x87ceeb, 0.005); // Nebel gegen abruptes Aufploppen

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            clock = new THREE.Clock();

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Licht
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(20, 40, 20);
            scene.add(dirLight);

            // Unendliche grüne Fläche (Boden-Kachel, die mit dem Spieler wandert)
            const floorGeo = new THREE.PlaneGeometry(2000, 2000);
            const floorMat = new THREE.MeshLambertMaterial({ color: 0x3b7a3b }); // Grün
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // GLB Modell laden
            const loader = new THREE.GLTFLoader();
            loader.load('1.glb', (gltf) => {
                // Sucht das erste nutzbare 3D-Mesh im GLB-Modell
                gltf.scene.traverse((child) => {
                    if (child.isMesh && !originalModelMesh) {
                        originalModelMesh = child;
                    }
                });

                if (originalModelMesh) {
                    animate(); // Spiel-Loop erst starten, wenn Modell geladen ist
                } else {
                    console.error("Kein Mesh in der GLB-Datei gefunden.");
                }
            }, undefined, (error) => {
                console.error("Fehler beim Laden von 1.glb. Hast du einen lokalen Server aktiv?", error);
            });

            window.addEventListener('resize', onWindowResize);
        }

        // --- CHUNK ENGINE ---
        function updateChunks() {
            // Aktuellen Chunk des Spielers berechnen
            const currentChunkX = Math.floor(player.pos.x / CHUNK_SIZE);
            const currentChunkZ = Math.floor(player.pos.z / CHUNK_SIZE);

            const visibleKeys = new Set();

            // Sichtbare Chunks generieren
            for (let x = -RENDER_DISTANCE; x <= RENDER_DISTANCE; x++) {
                for (let z = -RENDER_DISTANCE; z <= RENDER_DISTANCE; z++) {
                    const chunkX = currentChunkX + x;
                    const chunkZ = currentChunkZ + z;
                    const key = `${chunkX},${chunkZ}`;
                    visibleKeys.add(key);

                    if (!activeChunks.has(key)) {
                        createChunk(chunkX, chunkZ, key);
                    }
                }
            }

            // Chunks außerhalb der Sichtweite löschen (Performance-Schutz)
            for (let [key, instancedMesh] of activeChunks.entries()) {
                if (!visibleKeys.has(key)) {
                    scene.remove(instancedMesh);
                    instancedMesh.geometry.dispose();
                    activeChunks.delete(key);
                }
            }
        }

        // Einen einzelnen Chunk voller Modell-Instanzen erzeugen
        function createChunk(cx, cz, key) {
            // InstancedMesh sorgt dafür, dass alle Kopien in EINEM einzigen Befehl gerendert werden (kein Lagg)
            const instancedMesh = new THREE.InstancedMesh(
                originalModelMesh.geometry,
                originalModelMesh.material,
                MODELS_PER_CHUNK
            );

            const dummy = new THREE.Object3D();
            
            // Pseudo-Zufall basierend auf den Chunk-Koordinaten, damit ein Chunk immer gleich aussieht
            let seed = Math.sin(cx * 12.9898 + cz * 78.233) * 43758.5453;
            function random() {
                let x = Math.sin(seed++) * 10000;
                return x - Math.floor(x);
            }

            for (let i = 0; i < MODELS_PER_CHUNK; i++) {
                // Positionen innerhalb des Chunks zufällig bestimmen
                const localX = random() * CHUNK_SIZE;
                const localZ = random() * CHUNK_SIZE;
                
                const worldX = cx * CHUNK_SIZE + localX;
                const worldZ = cz * CHUNK_SIZE + localZ;

                dummy.position.set(worldX, 0, worldZ); // Auf dem Boden platzieren
                dummy.rotation.y = random() * Math.PI * 2; // Zufällige Drehung um die eigene Achse
                
                // Optional: Zufällige Skalierung (z.B. zwischen 0.8 und 1.5)
                const scale = 0.8 + random() * 0.7;
                dummy.scale.set(scale, scale, scale);

                dummy.updateMatrix();
                instancedMesh.setMatrixAt(i, dummy.matrix);
            }

            scene.add(instancedMesh);
            activeChunks.set(key, instancedMesh);
        }

        // --- GAME LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();

            if (document.pointerLockElement === document.body) {
                // Richtungsvektoren berechnen anhand des Kamerawinkels
                const forward = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw)).normalize();
                const right = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw)).normalize();

                // Bewegung anwenden
                if (moveForward) player.pos.addScaledVector(forward, MOVE_SPEED * delta);
                if (moveBackward) player.pos.addScaledVector(forward, -MOVE_SPEED * delta);
                if (moveLeft) player.pos.addScaledVector(right, -MOVE_SPEED * delta);
                if (moveRight) player.pos.addScaledVector(right, MOVE_SPEED * delta);

                // Dynamisch Chunks basierend auf neuer Position updaten
                updateChunks();
            }
        // Kameraausrichtung aktualisieren
camera.position.copy(player.pos);

const target = new THREE.Vector3();
target.x = player.pos.x + Math.sin(yaw) * Math.cos(pitch);
target.y = player.pos.y + Math.sin(pitch);
target.z = player.pos.z + Math.cos(yaw) * Math.cos(pitch);
camera.lookAt(target);

renderer.render(scene, camera);
}

function onWindowResize() {
camera.aspect = window.innerWidth / window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth, window.innerHeight);
}

// Start
init();
