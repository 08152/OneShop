<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake Hacker Simulator</title>

<style>
body {
    margin: 0;
    background: #050505;
    color: #00ff66;
    font-family: monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box {
    width: 500px;
    background: #111;
    border: 2px solid #00ff66;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 0 20px #00ff66;
}

h1 {
    text-align: center;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: black;
    color: #00ff66;
    border: 1px solid #00ff66;
    font-size: 20px;
    text-align: center;
}

button {
    width: 100%;
    margin-top: 15px;
    padding: 12px;
    background: #00ff66;
    color: black;
    border: none;
    cursor: pointer;
    font-size: 18px;
    font-weight: bold;
    border-radius: 8px;
}

button:hover {
    background: white;
}

#terminal {
    margin-top: 20px;
    height: 220px;
    overflow: hidden;
    background: black;
    padding: 10px;
    border-radius: 10px;
}

.line {
    margin: 5px 0;
}
</style>
</head>

<body>

<div class="box">

<h1>⚠ FAKE HACK SIMULATOR</h1>

<p>Ziel-Code eingeben (3 Zahlen):</p>

<input id="target" maxlength="3" placeholder="z.B. 527">

<button onclick="startHack()">START</button>

<div id="terminal">
<div class="line">Bereit...</div>
</div>

</div>


<script>

let interval;
let count = 0;

function startHack(){

    let target = document.getElementById("target").value;

    if(target.length !== 3 || isNaN(target)){
        alert("Bitte 3 Zahlen eingeben!");
        return;
    }

    clearInterval(interval);

    let terminal = document.getElementById("terminal");
    terminal.innerHTML = "";

    count = 0;

    interval = setInterval(()=>{

        count++;

        let fake =
        Math.floor(Math.random()*900+100);

        let line=document.createElement("div");
        line.className="line";

        line.innerHTML =
        "> Versuch #" + count +
        " | Code: " + fake +
        " | analysiere...";

        terminal.appendChild(line);

        if(terminal.children.length > 10){
            terminal.removeChild(terminal.firstChild);
        }


        if(count >= 1287){

            clearInterval(interval);

            terminal.innerHTML +=
            "<div class='line'>✔ Code gefunden: "
            + target +
            "</div>";

            terminal.innerHTML +=
            "<div class='line'>✔ Zugriff simuliert...</div>";

        }


    },1);

}

</script>

</body>
</html>
