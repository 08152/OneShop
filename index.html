<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GhostShop</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#f3f3f3;
    color:#222;
}


/* Navigation */

header{

    height:70px;
    background:#111;
    color:white;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 25px;
    position:sticky;
    top:0;
    z-index:10;

}

.logo{

    color:#ffd400;
    font-size:32px;
    font-weight:bold;

}


.cart-btn{

    cursor:pointer;
    font-size:28px;

}


/* Produkte */

.container{

    padding:30px;

}


.products{

    display:grid;
    grid-template-columns:
    repeat(auto-fit,minmax(220px,1fr));
    gap:25px;

}


.card{

    background:white;
    border-radius:18px;
    padding:20px;
    box-shadow:
    0 8px 20px rgba(0,0,0,.15);

    transition:.3s;

}


.card:hover{

    transform:translateY(-5px);

}


.card img{

    width:100%;
    height:180px;
    object-fit:contain;

}


.card h3{

    margin:15px 0;

}


.price{

    color:#e67e00;
    font-size:22px;
    font-weight:bold;

}


button{

    border:none;
    background:#ffd400;
    padding:12px 18px;
    border-radius:12px;
    cursor:pointer;
    font-weight:bold;
    margin-top:10px;

}


button:hover{

    filter:brightness(.9);

}


/* Warenkorb Seitenmenü */

.cart{

    position:fixed;
    top:0;
    right:-400px;
    width:380px;
    height:100%;
    background:white;
    z-index:20;
    box-shadow:-5px 0 20px #0005;
    padding:25px;
    transition:.4s;
    overflow:auto;

}


.cart.open{

    right:0;

}


.cart h2{

    margin-bottom:20px;

}


.cart-item{

    border-bottom:1px solid #ddd;
    padding:12px 0;

}


.total{

    font-size:22px;
    font-weight:bold;
    margin-top:20px;

}


/* Admin */

.admin{

    display:none;
    position:fixed;
    inset:0;
    background:white;
    z-index:50;
    padding:30px;
    overflow:auto;

}


.order{

    background:#eee;
    padding:20px;
    border-radius:15px;
    margin:15px 0;

}


.close{

    float:right;
    background:#222;
    color:white;

}


@media(max-width:500px){

.cart{

    width:100%;

}

}

</style>

</head>

<body>


<header>

<div class="logo">
GhostShop
</div>


<div class="cart-btn" onclick="openCart()">
🛒
<span id="cartCount">0</span>
</div>

</header>


<div class="container">

<h1>Unsere Produkte</h1>

<br>

<div class="products" id="products"></div>

</div>



<!-- Warenkorb -->

<div class="cart" id="cart">

<button onclick="closeCart()" class="close">
X
</button>

<h2>
Warenkorb
</h2>


<div id="cartItems"></div>


<div class="total">
Gesamt:
<span id="total">0</span> €
</div>


<button onclick="orderNow()">
Jetzt bestellen
</button>


</div>



<!-- Admin Menü -->

<div class="admin" id="admin">

<button onclick="closeAdmin()" class="close">
X
</button>

<h1>
GhostShop Verwaltung
</h1>


<div id="orders"></div>


</div>


<script>


// ==========================
// Produkte
// Neue Artikel einfach hier hinzufügen
// ==========================


const products = [

{
name:"Weihenstephan H-Milch 1L",
price:1.40,
img:"https://www.molkerei-weihenstephan.de/fileadmin/media/produkte/milch/haltbare_milch/hmilch_1l_35.png"
}

];



let cart=[];



function loadProducts(){

const box=
document.getElementById("products");


box.innerHTML="";


products.forEach((p,i)=>{


box.innerHTML+=`

<div class="card">

<img src="${p.img}">

<h3>${p.name}</h3>

<div class="price">
${p.price.toFixed(2)} €
</div>


<button onclick="addCart(${i})">
In den Warenkorb
</button>


</div>

`;


});


}


loadProducts();
<script>

// ==========================
// Warenkorb hinzufügen
// ==========================

function addCart(index){

    cart.push(products[index]);

    updateCart();

    alert(
        products[index].name +
        " wurde hinzugefügt"
    );

}


// ==========================
// Warenkorb anzeigen
// ==========================

function updateCart(){

    const box =
    document.getElementById("cartItems");

    box.innerHTML="";


    let total=0;


    cart.forEach((item,index)=>{


        total += item.price;


        box.innerHTML += `

        <div class="cart-item">

        <b>${item.name}</b><br>

        ${item.price.toFixed(2)} €

        <br>

        <button onclick="removeCart(${index})">
        Entfernen
        </button>


        </div>

        `;


    });


    document.getElementById("total")
    .innerText =
    total.toFixed(2);


    document.getElementById("cartCount")
    .innerText =
    cart.length;


}


// ==========================
// Artikel entfernen
// ==========================

function removeCart(index){

    cart.splice(index,1);

    updateCart();

}



// ==========================
// Warenkorb öffnen
// ==========================

function openCart(){

    document
    .getElementById("cart")
    .classList.add("open");

}


// ==========================
// Warenkorb schließen
// ==========================

function closeCart(){

    document
    .getElementById("cart")
    .classList.remove("open");

}



// ==========================
// Bestellung senden
// ==========================

async function orderNow(){


    if(cart.length===0){

        alert(
        "Der Warenkorb ist leer"
        );

        return;

    }



    let preis=0;


    cart.forEach(item=>{

        preis+=item.price;

    });



    const daten={

        artikel:cart,

        preis:
        Number(preis.toFixed(2))

    };



    try{


        await fetch(
        "/api/orders",
        {

            method:"POST",

            headers:{
            "Content-Type":
            "application/json"
            },


            body:
            JSON.stringify(daten)

        });



        alert(
        "Bestellung erfolgreich!"
        );


        cart=[];

        updateCart();

        closeCart();



    }catch(e){


        alert(
        "Fehler beim Bestellen"
        );


    }


}



// ==========================
// STRG Taste Admin PIN
// ==========================

document.addEventListener(
"keydown",
function(e){


if(e.ctrlKey){


let pin =
prompt(
"GhostShop Admin PIN:"
);



if(pin==="0123"){

openAdmin();

}


}



});




// ==========================
// Admin öffnen
// ==========================

async function openAdmin(){


document
.getElementById("admin")
.style.display="block";


loadOrders();


}



// ==========================
// Admin schließen
// ==========================

function closeAdmin(){


document
.getElementById("admin")
.style.display="none";


}



// ==========================
// Bestellungen laden
// ==========================

async function loadOrders(){


const res =
await fetch(
"/api/orders"
);


const orders =
await res.json();



const box =
document.getElementById("orders");


box.innerHTML="";



orders.forEach(order=>{


box.innerHTML += `


<div class="order">


<h3>
Bestellung ${order.id}
</h3>


<p>
Datum:
${order.datum}
</p>


<p>
Artikel:
<br>

${order.artikel
.map(a=>a.name)
.join("<br>")}

</p>


<p>
Preis:
${order.preis.toFixed(2)}
€
</p>


<p>
Status:
${order.status}
</p>



<button onclick="printList(${order.id})">

Einkaufszettel drucken

</button>



<button onclick="printInvoice(${order.id})">

Rechnung drucken

</button>



<button onclick="finishOrder(${order.id})">

Erledigen

</button>



</div>


`;



});



}




// ==========================
// Bestellung erledigen
// ==========================

async function finishOrder(id){


await fetch(
"/api/orders/"+id,
{

method:"DELETE"

});


loadOrders();


}




// ==========================
// Druck Funktionen
// ==========================

async function getOrder(id){


const res =
await fetch("/api/orders");


const orders =
await res.json();


return orders.find(
o=>o.id===id
);


}



async function printList(id){


const o =
await getOrder(id);



let win =
window.open("");



win.document.write(`


<h1>
GhostShop Einkaufszettel
</h1>


<h3>
Artikel:
</h3>


${o.artikel.map(
a=>a.name
).join("<br>")}


<br><br>


Preis:
${o.preis} €



`);



win.print();


}




async function printInvoice(id){


const o =
await getOrder(id);



let win =
window.open("");



win.document.write(`


<h1>
GhostShop Rechnung
</h1>


Datum:
${o.datum}


<br><br>


Artikel:

<br>


${o.artikel.map(
a=>a.name
).join("<br>")}


<br><br>


Gesamt:
${o.preis} €


<br><br>


Vielen Dank für Ihren Einkauf.



`);



win.print();



}



</script>


</body>
</html>
