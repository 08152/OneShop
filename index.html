<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Engine Editor</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Inter,Segoe UI,Arial,sans-serif;
        }

        :root{
            --bg:#1a1a1a;
            --panel:#232323;
            --panel2:#2c2c2c;
            --border:#3b3b3b;
            --text:#f2f2f2;
            --muted:#bcbcbc;
            --accent:#4ea3ff;
        }

        html,body{
            width:100%;
            height:100%;
            background:var(--bg);
            color:var(--text);
            overflow:hidden;
        }

        body{
            display:grid;
            grid-template-columns:260px 1fr 300px;
        }

        aside{
            background:var(--panel);
            border-right:1px solid var(--border);
            display:flex;
            flex-direction:column;
            overflow:hidden;
        }

        .right{
            border-right:none;
            border-left:1px solid var(--border);
        }

        .panel-title{
            background:var(--panel2);
            padding:16px;
            font-size:18px;
            font-weight:700;
            border-bottom:1px solid var(--border);
        }

        .content{
            flex:1;
            overflow:auto;
            padding:16px;
        }

        .asset-list{
            list-style:none;
        }

        .asset-list li{
            padding:10px 12px;
            margin-bottom:8px;
            border:1px solid var(--border);
            border-radius:8px;
            background:#2b2b2b;
            cursor:pointer;
            transition:.2s;
        }

        .asset-list li:hover{
            background:#343434;
            border-color:var(--accent);
        }

        main{
            display:flex;
            flex-direction:column;
            background:#111;
        }

        .toolbar{
            height:50px;
            background:var(--panel);
            border-bottom:1px solid var(--border);
            display:flex;
            align-items:center;
            padding:0 16px;
            font-weight:600;
        }

        .canvas-container{
            flex:1;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        canvas{
            width:100%;
            height:100%;
            background:#0f0f0f;
            border:1px solid var(--border);
            border-radius:10px;
            display:block;
        }

        .group{
            margin-bottom:24px;
        }

        .group h3{
            margin-bottom:12px;
            color:var(--muted);
            font-size:15px;
        }

        .field{
            display:flex;
            flex-direction:column;
            margin-bottom:14px;
        }

        label{
            margin-bottom:6px;
            font-size:13px;
            color:var(--muted);
        }

        input[type=number]{
            background:#2e2e2e;
            color:var(--text);
            border:1px solid var(--border);
            border-radius:6px;
            padding:10px;
            outline:none;
            transition:.2s;
        }

        input[type=number]:focus{
            border-color:var(--accent);
        }

        @media(max-width:1000px){
            body{
                grid-template-columns:220px 1fr;
            }

            .right{
                display:none;
            }
        }

        @media(max-width:700px){
            body{
                grid-template-columns:1fr;
            }

            aside{
                display:none;
            }
        }
    </style>
</head>

<body>

    <aside class="left">
        <div class="panel-title">
            Assets
        </div>

        <div class="content">
            <ul class="asset-list">
                <li>Sprites</li>
                <li>Texturen</li>
                <li>Modelle</li>
                <li>Audio</li>
                <li>Skripte</li>
                <li>Szenen</li>
                <li>Materialien</li>
                <li>Shader</li>
            </ul>
        </div>
    </aside>

    <main>

        <div class="toolbar">
            Web Game Engine Editor
        </div>

        <div class="canvas-container">
            <canvas id="gameCanvas"></canvas>
        </div>

    </main>

    <aside class="right">

        <div class="panel-title">
            Inspector
        </div>

        <div class="content">

            <div class="group">
                <h3>Position</h3>

                <div class="field">
                    <label for="posX">X</label>
                    <input id="posX" type="number" value="0" step="1">
                </div>

                <div class="field">
                    <label for="posY">Y</label>
                    <input id="posY" type="number" value="0" step="1">
                </div>
            </div>

            <div class="group">
                <h3>Skalierung</h3>

                <div class="field">
                    <label for="scaleW">W</label>
                    <input id="scaleW" type="number" value="100" step="1">
                </div>

                <div class="field">
                    <label for="scaleH">H</label>
                    <input id="scaleH" type="number" value="100" step="1">
                </div>
            </div>

        </div>

    </aside>

    <script type="module" src="main.js"></script>

</body>
</html>
