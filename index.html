<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>SecureShield Scanner</title>


<style>

*{
box-sizing:border-box;
}


body{

margin:0;
background:#050505;
font-family:Arial;
color:white;

}


.app{

width:90%;
max-width:750px;
margin:40px auto;
background:#111;
padding:30px;
border-radius:20px;
border:2px solid #ffd000;

}


h1{

text-align:center;
color:#ffd000;

}



.status{

width:180px;
height:180px;
margin:30px auto;

background:#ffd000;
border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

font-size:25px;
font-weight:bold;

color:black;

}



.upload{

display:block;

border:2px dashed #ffd000;

padding:35px;

text-align:center;

border-radius:15px;

cursor:pointer;

margin-top:25px;

}


input{

display:none;

}



button{

width:100%;

margin-top:20px;

padding:15px;

background:#ffd000;

border:none;

border-radius:10px;

font-size:18px;

font-weight:bold;

cursor:pointer;

}



button:hover{

background:#e0b600;

}



.progress{

margin-top:25px;

height:15px;

background:#333;

border-radius:20px;

overflow:hidden;

display:none;

}



.bar{

height:100%;

width:0%;

background:#ffd000;

}



.box{

margin-top:25px;

background:#1b1b1b;

padding:20px;

border-radius:15px;

border-left:5px solid #ffd000;

display:none;

}



.good{

color:#00ff55;

}


.bad{

color:red;

}



</style>

</head>



<body>


<div class="app">


<h1>🛡️ SecureShield</h1>


<div class="status" id="status">

SICHER

</div>



<label class="upload">

📁 Datei auswählen

<input type="file" id="file">

</label>



<button onclick="startScan()">

Scan starten

</button>



<div class="progress" id="progress">

<div class="bar" id="bar"></div>

</div>



<div class="box" id="result">

<h2>Scan Ergebnis</h2>

<p>Datei: <span id="filename"></span></p>

<p>Größe: <span id="filesize"></span></p>

<p>Muster: <span id="pattern"></span></p>

<p>Gefahr: <span id="danger"></span></p>

<p>Status: <span id="state"></span></p>


</div>


</div>



<script>


let selectedFile;

let daten;



document.getElementById("file").onchange=e=>{

selectedFile=e.target.files[0];

};



// JSON laden

fetch("wissen.json")

.then(r=>r.json())

.then(j=>{

daten=j;

});





function startScan(){


if(!selectedFile){

alert("Datei auswählen!");

return;

}


if(!daten){

alert("Wissensdatenbank lädt noch!");

return;

}



let progress=document.getElementById("progress");

let bar=document.getElementById("bar");


progress.style.display="block";


let p=0;


let timer=setInterval(()=>{


p+=4;

bar.style.width=p+"%";


if(p>=100){

clearInterval(timer);

scanFile();

}


},80);


}




function scanFile(){



let gefunden=null;



for(let virus of daten.muster){


if(selectedFile.name
.toLowerCase()
.includes(
virus.name.toLowerCase()
.split(".")[1]
)){


gefunden=virus;


}


}



let chance=Math.floor(Math.random()*40);


let gefahr=chance;


if(gefunden){

gefahr=gefunden.gefahr;

}



document.getElementById("filename").innerHTML=
selectedFile.name;


document.getElementById("filesize").innerHTML=
(selectedFile.size/1024).toFixed(2)+" KB";



document.getElementById("pattern").innerHTML=
gefunden ? gefunden.kennung : "Keine";



document.getElementById("danger").innerHTML=
gefahr+"%";



let status=document.getElementById("status");

let state=document.getElementById("state");



if(gefahr<40){


status.innerHTML="SICHER";

status.style.background="#ffd000";

state.innerHTML="Keine Gefahr";

state.className="good";


}

else{


status.innerHTML="GEFAHR";

status.style.background="red";

state.innerHTML="Bedrohung erkannt";

state.className="bad";


}


document.getElementById("result").style.display="block";


}


</script>


</body>

</html>
