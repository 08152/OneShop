<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Code KI</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
background:#202123;
color:white;
font-family:Arial, sans-serif;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

h1{
text-align:center;
}

textarea{
width:100%;
height:150px;
background:#111;
color:white;
border:1px solid #555;
border-radius:10px;
padding:15px;
font-size:17px;
resize:none;
}

button{
margin-top:15px;
width:100%;
padding:15px;
background:#00a67e;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#008f6a;
}

pre{
margin-top:20px;
background:#000;
color:#00ff99;
padding:20px;
border-radius:10px;
min-height:200px;
white-space:pre-wrap;
font-family:monospace;
}

.status{
text-align:center;
margin-top:10px;
color:#aaa;
}

</style>

</head>


<body>


<div class="container">

<h1>🤖 Meine Code KI</h1>

<textarea 
id="frage"
placeholder="Beschreibe deinen Code-Wunsch...">
</textarea>


<button onclick="startKI()">
Code erstellen
</button>


<div class="status" id="status">
Bereit
</div>


<pre id="antwort">
Hier erscheint nur Code...
</pre>


</div>



<script>


async function startKI(){


let frage =
document.getElementById("frage").value;


let antwort =
document.getElementById("antwort");


let status =
document.getElementById("status");


if(frage.trim()==""){
antwort.textContent="Bitte eine Frage eingeben.";
return;
}


status.textContent="KI arbeitet...";


antwort.textContent="";


try{


let res = await fetch(
"https://oneshop-1.onrender.com/frage",
{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(
{
frage:frage
}
)

});


let daten = await res.json();


if(daten.antwort){

antwort.textContent=daten.antwort;

}

else{

antwort.textContent=
"Keine Antwort vom KI-Server.";

}


status.textContent="Fertig";


}

catch(error){


status.textContent="Fehler";


antwort.textContent=
"Server nicht erreichbar.\n\n"+
error;


}


}



</script>


</body>
</html>
