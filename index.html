<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>GhostShop</title>


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}


body{

    background:#f2f2f2;
    overflow-x:hidden;

}


/* Navigation */

header{

    width:100%;
    height:70px;

    background:#111;

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 20px;

    position:sticky;
    top:0;

    z-index:10;

}


.logo{

    color:#ffd400;

    font-size:clamp(24px,5vw,34px);

    font-weight:bold;

}



.cart-icon{

    color:white;

    font-size:35px;

    cursor:pointer;

    padding:10px;

    touch-action:manipulation;

}



/* Produkte */

.container{

    width:100%;

    padding:20px;

}



.products{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(220px,1fr));

    gap:20px;

}



.card{

    background:white;

    border-radius:20px;

    padding:20px;

    box-shadow:
    0 5px 20px #0003;

    text-align:center;

    user-select:none;

    transition:.2s;

}



.card:active{

    transform:scale(.96);

}



.card img{

    width:100%;

    height:180px;

    object-fit:contain;

}



.card h3{

    margin:15px 0;

    font-size:18px;

}



.price{

    font-size:24px;

    color:#e68a00;

    font-weight:bold;

}




/* Touch Buttons */


button{

    width:100%;

    min-height:50px;

    border:none;

    border-radius:15px;

    background:#ffd400;

    font-size:17px;

    font-weight:bold;

    margin-top:10px;

    cursor:pointer;

    touch-action:manipulation;

}


button:active{

    transform:scale(.95);

}




/* Warenkorb */


.cart-panel{

    position:fixed;

    top:0;

    right:-100%;

    width:min(400px,100%);

    height:100vh;

    background:white;

    z-index:50;

    padding:20px;

    transition:.4s;

    overflow:auto;

    box-shadow:
    -5px 0 20px #0005;

}



.cart-panel.open{

    right:0;

}




.cart-item{

    padding:15px 0;

    border-bottom:1px solid #ddd;

}



.total{

    font-size:24px;

    font-weight:bold;

    margin-top:20px;

}



/* Bildschirmanpassung */


@media(max-width:600px){


header{

    height:60px;

}


.container{

    padding:10px;

}



.products{

    grid-template-columns:
    1fr;

}



.card img{

    height:220px;

}


}



@media(min-width:601px) and (max-width:1100px){


.products{

    grid-template-columns:
    repeat(2,1fr);

}


}



@media(min-width:1101px){


.products{

    grid-template-columns:
    repeat(4,1fr);

}


}



</style>

</head>



<body>


<header>


<div class="logo">
GhostShop
</div>


<div class="cart-icon" onclick="openCart()">

🛒

<span id="count">
0
</span>

</div>


</header>



<div class="container">


<h1>
Produkte
</h1>


<br>


<div class="products" id="products">

</div>


</div>




<div class="cart-panel" id="cart">


<button onclick="closeCart()">
✖ Schließen
</button>


<h2>
Warenkorb
</h2>


<div id="cartItems">

</div>


<div class="total">

Gesamt:
<span id="total">
0
</span> €

</div>


<button>

Jetzt bestellen

</button>


</div>
<script>


// ============================
// Produkte
// Neue Artikel hier hinzufügen
// ============================


const products = [

{
name:"Weihenstephan H-Milch 1L",
price:1.40,
img:"https://www.molkerei-weihenstephan.de/fileadmin/media/produkte/milch/haltbare_milch/hmilch_1l_35.png"
},


{
name:"Neuer Artikel",
price:2.50,
img:"https://via.placeholder.com/300"
}


];



let cart=[];



// ============================
// Produkte anzeigen
// ============================


function loadProducts(){


let box =
document.getElementById("products");


box.innerHTML="";



products.forEach((p,index)=>{


box.innerHTML += `


<div class="card">


<img src="${p.img}">


<h3>
${p.name}
</h3>


<div class="price">

${p.price.toFixed(2)} €

</div>


<button onclick="addCart(${index})">

🛒 In den Warenkorb

</button>


</div>


`;


});


}


loadProducts();




// ============================
// Warenkorb hinzufügen
// ============================


function addCart(index){


cart.push(products[index]);


updateCart();


}




// ============================
// Warenkorb aktualisieren
// ============================


function updateCart(){


let box =
document.getElementById("cartItems");


box.innerHTML="";


let sum=0;



cart.forEach((item,index)=>{


sum += item.price;



box.innerHTML += `


<div class="cart-item">


<b>
${item.name}
</b>


<br>


${item.price.toFixed(2)} €


<button onclick="removeItem(${index})">

Entfernen

</button>


</div>


`;



});



document.getElementById("total")
.innerText =
sum.toFixed(2);



document.getElementById("count")
.innerText =
cart.length;



}




function removeItem(index){


cart.splice(index,1);


updateCart();


}




// ============================
// Seitenmenü
// ============================


function openCart(){


document
.getElementById("cart")
.classList.add("open");


}



function closeCart(){


document
.getElementById("cart")
.classList.remove("open");


}





// ============================
// Touch Wischen
// ============================


let touchStart=0;


document.addEventListener(
"touchstart",
function(e){


touchStart =
e.changedTouches[0].screenX;


});



document.addEventListener(
"touchend",
function(e){


let touchEnd =
e.changedTouches[0].screenX;



// nach links wischen

if(touchStart-touchEnd > 80){


openCart();


}



// nach rechts wischen

if(touchEnd-touchStart > 80){


closeCart();


}



});




// ============================
// Automatische Bildschirm-Anpassung
// ============================


function screenCheck(){


let width =
window.innerWidth;



if(width < 600){

document.body.dataset.device="handy";

}


else if(width < 1100){


document.body.dataset.device="tablet";


}

else{


document.body.dataset.device="pc";


}



}



window.addEventListener(
"resize",
screenCheck
);


screenCheck();




// ============================
// Verhindert Zoom-Probleme
// ============================


document.addEventListener(
"gesturestart",
function(e){

e.preventDefault();

});



</script>


</body>

</html>
