<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Offline Beat AI</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
background:#111;
color:#0f0;
font-family:Arial;
padding:20px;
}

h1{
text-align:center;
margin-bottom:20px;
}

#top{
display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
margin-bottom:20px;
}

button{
padding:12px;
font-size:18px;
cursor:pointer;
background:#222;
color:#0f0;
border:1px solid #0f0;
}

button:hover{
background:#0f0;
color:#000;
}

#status{
margin-top:15px;
text-align:center;
font-size:20px;
}

#playlist{
margin-top:25px;
border:1px solid #0f0;
padding:10px;
height:250px;
overflow:auto;
}

.track{
padding:5px;
border-bottom:1px solid #333;
}

audio{
width:100%;
margin-top:4px;
}

input{
padding:10px;
font-size:18px;
width:250px;
}

#timeline{
margin-top:20px;
height:20px;
background:#222;
}

#playhead{
height:20px;
width:0%;
background:#0f0;
}

</style>
</head>

<body>

<h1>Offline Beat AI</h1>

<div id="top">

<input
id="prompt"
placeholder="HipHop mit Piano">

<button id="generate">
Song erstellen
</button>

<button id="play">
Play
</button>

<button id="stop">
Stop
</button>

</div>

<div id="status">

Bereit.

</div>

<div id="timeline">
<div id="playhead"></div>
</div>

<div id="playlist">

</div>

<script>

const SOUND_FOLDER="1/";

const sounds=[

"kick_1.wav",
"kick_2.wav",

"snare_1.wav",
"snare_2.wav",

"hihat_1.wav",
"hihat_2.wav",

"piano_1.wav",
"piano_2.wav",

"bass_1.wav",
"bass_2.wav",

"guitar_1.wav",
"guitar_2.wav"

];

const audio={};

let generated=[];

let bpm=120;

let seconds=10;

const ctx=new(window.AudioContext||window.webkitAudioContext)();
function loadSounds(){

    sounds.forEach(name=>{

        const a=new Audio(SOUND_FOLDER+name);
        a.preload="auto";
        audio[name]=a;

    });

}

loadSounds();

function random(list){
    return list[Math.floor(Math.random()*list.length)];
}

function byType(type){
    return sounds.filter(s=>s.startsWith(type));
}

function generateSong(){

    generated=[];

    const kick=byType("kick");
    const snare=byType("snare");
    const hihat=byType("hihat");
    const piano=byType("piano");
    const bass=byType("bass");
    const guitar=byType("guitar");

    // 10 Sekunden Song
    for(let t=0;t<seconds;t+=0.5){

        generated.push({
            time:t,
            sound:random(kick)
        });

        if(Math.random()>0.5){
            generated.push({
                time:t+0.25,
                sound:random(hihat)
            });
        }

        if(Math.random()>0.65){
            generated.push({
                time:t+0.5,
                sound:random(snare)
            });
        }

        if(Math.random()>0.75){
            generated.push({
                time:t,
                sound:random(piano)
            });
        }

        if(Math.random()>0.80){
            generated.push({
                time:t,
                sound:random(bass)
            });
        }

        if(Math.random()>0.88){
            generated.push({
                time:t,
                sound:random(guitar)
            });
        }

    }

    document.getElementById("status").textContent=
        "Song erstellt ("+generated.length+" Sounds)";

    showPlaylist();

}
function showPlaylist(){

    const list=document.getElementById("playlist");
    list.innerHTML="";

    generated.sort((a,b)=>a.time-b.time);

    generated.forEach((item,i)=>{

        const div=document.createElement("div");
        div.className="track";

        div.innerHTML=
        "<b>"+(i+1)+".</b> "+
        item.sound+
        " | "+item.time.toFixed(2)+" s";

        list.appendChild(div);

    });

}

let timers=[];
let playing=false;

function playSong(){

    stopSong();

    playing=true;

    const start=performance.now();

    generated.forEach(note=>{

        const timer=setTimeout(()=>{

            if(!playing) return;

            const a=new Audio(SOUND_FOLDER+note.sound);
            a.volume=0.8;
            a.play();

        },note.time*1000);

        timers.push(timer);

    });

    animateTimeline(start);

}

function animateTimeline(start){

    const bar=document.getElementById("playhead");

    function update(){

        if(!playing) return;

        const elapsed=(performance.now()-start)/1000;

        let p=(elapsed/seconds)*100;

        if(p>100)p=100;

        bar.style.width=p+"%";

        if(elapsed<seconds){

            requestAnimationFrame(update);

        }else{

            playing=false;

            bar.style.width="100%";

        }

    }

    update();

}
function stopSong(){

    playing=false;

    timers.forEach(t=>clearTimeout(t));
    timers=[];

    document.getElementById("playhead").style.width="0%";

}

document.getElementById("generate").onclick=()=>{

    const prompt=document
        .getElementById("prompt")
        .value
        .toLowerCase();

    // Einfacher Stil-Einfluss
    if(prompt.includes("slow")) bpm=80;
    else if(prompt.includes("fast")) bpm=160;
    else bpm=120;

    generateSong();

};

document.getElementById("play").onclick=async()=>{

    if(ctx.state==="suspended"){
        await ctx.resume();
    }

    playSong();

};

document.getElementById("stop").onclick=()=>{

    stopSong();

};

// Beim Start direkt einen Song erzeugen
generateSong();

</script>

</body>
</html>
