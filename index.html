<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SecureShield Scanner</title>

<style>

body{
    margin:0;
    background:#f3f3f3;
    font-family:Arial, sans-serif;
    color:#222;
}

.container{
    max-width:700px;
    margin:40px auto;
    background:white;
    border-radius:20px;
    padding:30px;
    box-shadow:0 5px 25px #bbb;
    text-align:center;
}


h1{
    font-size:32px;
}


.circle{
    width:180px;
    height:180px;
    background:#f5c400;
    border-radius:50%;
    margin:30px auto;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
    font-weight:bold;
    color:white;
    box-shadow:0 0 20px #d9a900;
}


.upload{
    border:3px dashed #f5c400;
    padding:40px;
    border-radius:15px;
    cursor:pointer;
    margin-top:20px;
}


input{
    display:none;
}


button{
    margin-top:20px;
    background:#f5c400;
    border:none;
    padding:15px 35px;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}


button:hover{
    background:#dba900;
}


.result{
    margin-top:30px;
    text-align:left;
    background:#fafafa;
    padding:20px;
    border-radius:15px;
    display:none;
}


.progress{
    width:100%;
    height:15px;
    background:#ddd;
    border-radius:20px;
    overflow:hidden;
    display:none;
}


.bar{
    width:0%;
    height:100%;
    background:#f5c400;
}


.safe{
    color:green;
    font-weight:bold;
}


.danger{
    color:red;
    font-weight:bold;
}


</style>

</head>


<body>


<div class="container">


<h1>🛡️ SecureShield</h1>

<div class="circle" id="status">
Sicher
</div>


<label class="upload">

📁 Datei oder Ordner auswählen

<input type="file" id="file">

</label>


<button onclick="scan()">Scan starten</button>


<div class="progress" id="progress">
<div class="bar" id="bar"></div>
</div>



<div class="result" id="result">

<h2>Scan Ergebnis</h2>

<p><b>Dateiname:</b> <span id="name"></span></p>

<p><b>Größe:</b> <span id="size"></span></p>

<p><b>Muster:</b> <span id="pattern"></span></p>

<p><b>Gefahr:</b> <span id="danger"></span></p>

<p><b>Status:</b> <span id="level"></span></p>


</div>


</div>



<script>


let file;


document.getElementById("file").onchange=function(e){

file=e.target.files[0];

}



function scan(){


if(!file){

alert("Bitte zuerst eine Datei auswählen!");

return;

}


let progress=document.getElementById("progress");
let bar=document.getElementById("bar");

progress.style.display="block";


let value=0;


let timer=setInterval(()=>{


value+=5;

bar.style.width=value+"%";


if(value>=100){


clearInterval(timer);

showResult();


}


},100);



}



function showResult(){


let result=document.getElementById("result");

result.style.display="block";


let danger=Math.floor(Math.random()*101);


document.getElementById("name").innerHTML=file.name;


document.getElementById("size").innerHTML=
(file.size/1024).toFixed(2)+" KB";


document.getElementById("pattern").innerHTML=
"SS-"+Math.floor(Math.random()*999999);


document.getElementById("danger").innerHTML=
danger+"%";



let status=document.getElementById("status");

let level=document.getElementById("level");


if(danger<30){


status.style.background="#f5c400";
status.innerHTML="Sicher";

level.innerHTML="Keine Bedrohung erkannt";
level.className="safe";


}

else if(danger<70){


status.style.background="orange";
status.innerHTML="Warnung";

level.innerHTML="Verdächtige Datei";
level.className="danger";


}

else{


status.style.background="red";
status.innerHTML="Gefahr";

level.innerHTML="Bedrohung gefunden";
level.className="danger";


}



}


</script>


</body>
</html>
