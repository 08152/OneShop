<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Benachrichtigung Test</title>
</head>

<body style="font-family:Arial;text-align:center;padding-top:100px;background:#222;color:white;">

<h1>Notification Test</h1>

<button onclick="benachrichtigung()">
    Popups erlauben
</button>

<script>
function benachrichtigung() {

    if (!("Notification" in window)) {
        alert("Dieser Browser unterstützt keine Benachrichtigungen.");
        return;
    }

    Notification.requestPermission().then(permission => {

        if (permission === "granted") {

            new Notification("Hi", {
                body: "Das ist eine echte Browser-Benachrichtigung!",
                icon: "https://cdn-icons-png.flaticon.com/512/1827/1827392.png"
            });

        } else {
            alert("Benachrichtigungen wurden abgelehnt.");
        }

    });

}
</script>

</body>
</html>
