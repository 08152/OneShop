<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GhostChat</title>


<style>

*{
box-sizing:border-box;
font-family:Arial,sans-serif;
}


body{

margin:0;
background:#080808;
color:white;
height:100vh;

}



/* LOGIN */

#loginBox{

height:100vh;
display:flex;
justify-content:center;
align-items:center;

}


.card{

background:#151515;
padding:30px;
border-radius:25px;
width:90%;
max-width:400px;

}



.logo{

font-size:35px;
text-align:center;
color:#ffd400;
font-weight:bold;
margin-bottom:20px;

}



input{

width:100%;
padding:15px;
margin:7px 0;

border:none;
border-radius:12px;

background:#222;
color:white;

font-size:16px;

}



button{

width:100%;
padding:15px;

margin-top:10px;

border:none;
border-radius:12px;

background:#ffd400;

font-weight:bold;

font-size:16px;

}





/* CHAT */

#chat{

display:none;
height:100vh;

}



.sidebar{

width:260px;
background:#111;
padding:20px;

}



.sidebar h1{

color:#ffd400;

}



.chat{

flex:1;
display:flex;
flex-direction:column;

}



.header{

background:#ffd400;
color:black;
padding:20px;
font-weight:bold;

}



.messages{

flex:1;
overflow:auto;
padding:15px;

}



.msg{

background:#222;
padding:15px;
border-radius:15px;

margin-bottom:10px;

max-width:500px;

}



.msg b{

color:#ffd400;

}



.send{

display:flex;
padding:15px;
background:#111;

gap:10px;

}



.send button{

width:70px;

}





/* POPUP UNTEN RECHTS */

#notify{

position:fixed;

right:20px;

bottom:20px;

background:#ffd400;

color:black;

padding:18px;

border-radius:15px;

display:none;

width:300px;

font-weight:bold;

box-shadow:0 0 20px black;

z-index:999;

}





@media(max-width:700px){


#chat{

flex-direction:column;

}


.sidebar{

width:100%;
height:150px;

}


}




</style>

</head>



<body>



<div id="loginBox">


<div class="card">


<div class="logo">

💬 GhostChat

</div>



<input id="email" placeholder="E-Mail">

<input id="pin" placeholder="PIN">

<input id="name" placeholder="Öffentlicher Name">



<button onclick="register()">

Account erstellen

</button>


<button onclick="login()">

Anmelden

</button>


<p id="info"></p>


</div>

</div>






<div id="chat">



<div class="sidebar">


<h1>
GhostChat
</h1>


<h3>
Online
</h3>


<div id="users"></div>


<button onclick="logout()">

Ausloggen

</button>


</div>







<div class="chat">


<div class="header">

💬 Chat

</div>


<div class="messages" id="messages">

</div>



<div class="send">


<input id="text" placeholder="Nachricht...">


<button onclick="send()">

➤

</button>


</div>



</div>


</div>





<!-- Popup -->

<div id="notify">

</div>





<script src="/socket.io/socket.io.js"></script>


<script>


const socket=io();


let username="";




// Benachrichtigung erlauben

function notifications(){


if(Notification.permission!=="granted"){


Notification.requestPermission();


}


}


notifications();





function register(){


fetch("/register",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

email:email.value,

pin:pin.value,

name:name.value

})


})
.then(r=>r.json())
.then(d=>{


info.innerHTML =
d.success?
"Account erstellt":
d.message;


});


}






function login(){


fetch("/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

email:email.value,

pin:pin.value

})

})

.then(r=>r.json())

.then(d=>{


if(d.success){


username=d.name;


loginBox.style.display="none";


chat.style.display="flex";


socket.emit(
"join",
username
);


}

else{


info.innerHTML="Login falsch";


}


});


}






function send(){


if(text.value.trim()=="")
return;


socket.emit(
"message",
text.value
);


text.value="";


}







socket.on("message",(m)=>{


// Nachricht in Chat

messages.innerHTML += `

<div class="msg">

<b>${m.user}</b><br>

${m.text}

<br>

<small>${m.time}</small>

</div>

`;





messages.scrollTop=
messages.scrollHeight;





// Popup unten rechts

showNotification(
m.user,
m.text
);





// ChromeOS Benachrichtigung

if(Notification.permission==="granted"
&& m.user!==username){


new Notification(

"Neue Nachricht von "+m.user,

{

body:m.text

}

);


}



});






function showNotification(user,text){


notify.innerHTML=

"💬 "+user+
"<br><br>"+
text;


notify.style.display="block";



setTimeout(()=>{


notify.style.display="none";


},5000);



}







socket.on("users",(u)=>{


users.innerHTML=
u.map(
x=>"🟡 "+x
).join("<br>");


});






function logout(){

location.reload();

}



</script>


</body>

</html>
