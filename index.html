<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Terminal Diary</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --term-green: #33ff33;
            --term-dim: #11aa11;
            --term-dark: #051a05;
        }

        body {
            background-color: var(--bg-color);
            color: var(--term-green);
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            margin: 0;
        }

        #terminal {
            max-width: 900px;
            margin: 0 auto;
            border: 2px solid var(--term-green);
            background-color: var(--term-dark);
            padding: 20px;
            box-shadow: 0 0 20px rgba(51, 255, 51, 0.2);
            min-height: 80vh;
            display: flex;
            flex-direction: column;
        }

        #output {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 20px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .log-entry {
            border-bottom: 1px dashed var(--term-dim);
            padding: 10px 0;
            margin-bottom: 10px;
        }

        .meta {
            color: var(--term-dim);
            font-size: 0.85em;
            margin-bottom: 5px;
        }

        #auth-zone, #write-zone, #admin-zone {
            border-top: 2px dashed var(--term-green);
            padding-top: 20px;
            margin-top: auto;
        }

        #write-zone, #admin-zone {
            display: none;
        }

        .input-line {
            display: flex;
            align-items: center;
        }

        .prompt {
            margin-right: 10px;
            white-space: nowrap;
        }

        input[type="text"], input[type="password"], textarea {
            background: transparent;
            border: none;
            color: var(--term-green);
            font-family: 'Courier New', Courier, monospace;
            font-size: 1em;
            outline: none;
            width: 100%;
        }

        textarea {
            resize: none;
            height: 100px;
        }

        #live-preview {
            color: var(--term-dim);
            margin-top: 10px;
            min-height: 20px;
            white-space: pre-wrap;
            position: relative;
        }

        #live-preview::after {
            content: "█";
            background: var(--term-green);
            color: var(--term-green);
            display: inline-block;
            width: 10px;
            margin-left: 2px;
            animation: none;
        }

        .btn {
            background: var(--term-dark);
            border: 1px solid var(--term-green);
            color: var(--term-green);
            padding: 5px 15px;
            cursor: pointer;
            font-family: 'Courier New', Courier, monospace;
            margin-top: 10px;
        }

        .btn:hover {
            background: var(--term-green);
            color: var(--term-dark);
        }

        .admin-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--term-dim);
            padding: 8px 0;
        }

        .admin-text {
            max-width: 70%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .delete-btn {
            background: #200000;
            border: 1px solid #ff3333;
            color: #ff3333;
            padding: 2px 8px;
            cursor: pointer;
            font-family: 'Courier New', Courier, monospace;
        }

        .delete-btn:hover {
            background: #ff3333;
            color: #000000;
        }
    </style>
</head>
<body>

<div id="terminal">
    <div id="output"></div>

    <div id="auth-zone">
        <div class="input-line">
            <span class="prompt">CLEARANCE_CODE ></span>
            <input type="password" id="clearance-input" autofocus>
        </div>
    </div>

    <div id="write-zone">
        <div class="input-line">
            <span class="prompt">INPUT_LOG ></span>
            <textarea id="log-input" placeholder="Tippe deinen Eintrag... (STRG+ENTER zum Speichern, /clear zum Zurücksetzen)"></textarea>
        </div>
        <button class="btn" id="save-btn">SAVE_LOG</button>
        <div id="live-preview"></div>
    </div>

    <div id="admin-zone">
        <div style="color: #ff3333; margin-bottom: 15px;">--- ADMIN CONTROL PANEL (RISKY_DELETE) ---</div>
        <div id="admin-list"></div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io('https://oneshop-1.onrender.com');

    const authZone = document.getElementById('auth-zone');
    const writeZone = document.getElementById('write-zone');
    const adminZone = document.getElementById('admin-zone');
    const clearanceInput = document.getElementById('clearance-input');
    const logInput = document.getElementById('log-input');
    const saveBtn = document.getElementById('save-btn');
    const output = document.getElementById('output');
    const livePreview = document.getElementById('live-preview');
    const adminList = document.getElementById('admin-list');

    let allEntries = [];

    const savedBuffer = localStorage.getItem('diary_buffer');
    if (savedBuffer) {
        logInput.value = savedBuffer;
        livePreview.textContent = savedBuffer;
    }

    clearanceInput.addEventListener('input', (e) => {
        const val = e.target.value.trim();
        if (val === 'Risky_Live') {
            authZone.style.display = 'none';
            adminZone.style.display = 'none';
            writeZone.style.display = 'block';
            logInput.focus();
        } else if (val === 'Risky_Delete') {
            authZone.style.display = 'none';
            writeZone.style.display = 'none';
            adminZone.style.display = 'block';
            renderAdminList();
        }
    });

    logInput.addEventListener('input', (e) => {
        const text = e.target.value;
        livePreview.textContent = text;
        localStorage.setItem('diary_buffer', text);
        socket.emit('typing', { text: text });
    });

    function handleSave() {
        const text = logInput.value;
        if (!text) return;

        if (text.trim() === '/clear') {
            logInput.value = '';
            livePreview.textContent = '';
            localStorage.removeItem('diary_buffer');
            socket.emit('typing', { text: '' });
            return;
        }

        socket.emit('new_entry', { text: text });
        logInput.value = '';
        livePreview.textContent = '';
        localStorage.removeItem('diary_buffer');
    }

    saveBtn.addEventListener('click', handleSave);

    logInput.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key === 'Enter') {
            e.preventDefault();
            handleSave();
        }
    });

    function formatDate(isoString) {
        const d = new Date(isoString);
        return d.toLocaleString('de-DE');
    }

    function renderLogs(entries) {
        output.innerHTML = '';
        entries.forEach(entry => {
            const div = document.createElement('div');
            div.className = 'log-entry';
            div.innerHTML = `
                <div class="meta">[TIMESTAMP: ${formatDate(entry.timestamp)}] [ID: ${entry.id}]</div>
                <div>${entry.text}</div>
            `;
            output.appendChild(div);
        });
        output.scrollTop = output.scrollHeight;
    }

    function renderAdminList() {
        adminList.innerHTML = '';
        if (allEntries.length === 0) {
            adminList.innerHTML = '<div style="color: var(--term-dim);">Keine Einträge vorhanden.</div>';
            return;
        }
        allEntries.forEach(entry => {
            const div = document.createElement('div');
            div.className = 'admin-item';
            div.innerHTML = `
                <div class="admin-text">[${formatDate(entry.timestamp)}] ${entry.text}</div>
                <button class="delete-btn" onclick="deleteLog('${entry.id}')">[DELETE_LOG]</button>
            `;
            adminList.appendChild(div);
        });
    }

    window.deleteLog = function(id) {
        if (confirm(`Eintrag ${id} wirklich löschen?`)) {
            socket.emit('delete_entry', id);
        }
    };

    socket.on('init', (entries) => {
        allEntries = entries;
        renderLogs(entries);
        if (adminZone.style.display === 'block') {
            renderAdminList();
        }
    });

    socket.on('entry_added', (entries) => {
        allEntries = entries;
        renderLogs(entries);
        if (adminZone.style.display === 'block') {
            renderAdminList();
        }
    });

    socket.on('entry_deleted', (entries) => {
        allEntries = entries;
        renderLogs(entries);
        if (adminZone.style.display === 'block') {
            renderAdminList();
        }
    });

    socket.on('typing', (data) => {
        if (authZone.style.display !== 'none' || adminZone.style.display === 'block') {
            livePreview.textContent = data.text;
        }
    });
</script>
</body>
</html>
