<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Zeichen Film Maker</title>

<style>
body{
    margin:0;
    background:#202020;
    color:white;
    font-family:Arial;
    text-align:center;
}

h1{
    background:#111;
    padding:15px;
}

canvas{
    background:white;
    border:3px solid black;
    cursor:crosshair;
}

button,input{
    margin:5px;
    padding:10px;
    font-size:16px;
}

#frames{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}

.frame{
    border:2px solid white;
    margin:5px;
}

.frame img{
    width:100px;
}
</style>
</head>

<body>

<h1>🎨 Zeichen Film Maker</h1>

<canvas id="canvas" width="800" height="500"></canvas>

<br>

Stärke:
<input id="opacity" type="range" min="1" max="100" value="100">

Dicke:
<input id="size" type="range" min="1" max="50" value="5">

<br>

<button onclick="clearCanvas()">🆕 Neues Bild</button>
<button onclick="saveFrame()">📸 Bild speichern</button>
<button onclick="duplicateFrame()">📋 Duplizieren</button>
<button onclick="playFilm()">▶ Film abspielen</button>
<button onclick="downloadFilm()">⬇ Film downloaden</button>

<h2>Frames</h2>
<div id="frames"></div>

<br>

<video id="video" controls></video>


<script>

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

let drawing=false;

let frames=[];

ctx.fillStyle="white";
ctx.fillRect(0,0,canvas.width,canvas.height);


// Zeichnen

canvas.onmousedown=e=>{
    drawing=true;
    draw(e);
};

canvas.onmouseup=()=>{
    drawing=false;
};

canvas.onmousemove=e=>{
    if(drawing) draw(e);
};


function draw(e){

    let rect=canvas.getBoundingClientRect();

    let x=e.clientX-rect.left;
    let y=e.clientY-rect.top;


    ctx.beginPath();

    ctx.lineWidth=document.getElementById("size").value;

    ctx.globalAlpha=
    document.getElementById("opacity").value/100;

    ctx.strokeStyle="black";

    ctx.lineCap="round";

    ctx.moveTo(x,y);
    ctx.lineTo(x,y);

    ctx.stroke();
}



// neues Bild

function clearCanvas(){

ctx.globalAlpha=1;

ctx.fillStyle="white";
ctx.fillRect(
0,
0,
canvas.width,
canvas.height
);

}


// Frame speichern

function saveFrame(){

let img=canvas.toDataURL();

frames.push(img);

showFrames();

}



// Frames anzeigen

function showFrames(){

let box=document.getElementById("frames");

box.innerHTML="";


frames.forEach((f,i)=>{

let div=document.createElement("div");

div.className="frame";


let img=document.createElement("img");

img.src=f;


div.appendChild(img);


let b=document.createElement("button");

b.innerHTML="Laden";

b.onclick=()=>{

let image=new Image();

image.src=f;

image.onload=()=>{

ctx.drawImage(
image,
0,
0
);

};

};


div.appendChild(b);


box.appendChild(div);

});

}



// duplizieren

function duplicateFrame(){

if(frames.length>0){

frames.push(
frames[frames.length-1]
);

showFrames();

}

}



// Film abspielen

function playFilm(){

let i=0;


let interval=setInterval(()=>{


let img=new Image();

img.src=frames[i];


img.onload=()=>{

ctx.drawImage(
img,
0,
0
);

};


i++;


if(i>=frames.length)
clearInterval(interval);


},300);


}



// Film exportieren

async function downloadFilm(){

if(frames.length==0){
alert("Keine Bilder!");
return;
}


let stream=
canvas.captureStream(5);


let recorder=
new MediaRecorder(stream,
{
mimeType:"video/webm"
});


let chunks=[];


recorder.ondataavailable=e=>{
chunks.push(e.data);
};


recorder.onstop=()=>{

let blob=
new Blob(chunks,
{
type:"video/webm"
});


let url=
URL.createObjectURL(blob);


let a=document.createElement("a");

a.href=url;

a.download="mein_zeichenfilm.webm";

a.click();


};


recorder.start();


let i=0;


let timer=setInterval(()=>{

let img=new Image();

img.src=frames[i];


img.onload=()=>{

ctx.drawImage(
img,
0,
0
);

};


i++;


if(i>=frames.length){

clearInterval(timer);

setTimeout(()=>{

recorder.stop();

},500);

}


},300);


}

</script>


</body>
</html>
