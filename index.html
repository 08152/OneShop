<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Terminal Diary</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --term-green: #33ff33;
            --term-dim: #11aa11;
            --term-dark: #051a05;
        }

        * {
            box-sizing: border-box;
        }

        body, html {
            background-color: var(--bg-color);
            color: var(--term-green);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }

        #terminal {
            width: 100vw;
            height: 100vh;
            background-color: var(--term-dark);
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        #output {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 20px;
            white-space: pre-wrap;
            word-wrap: break-word;
            padding-right: 10px;
        }

        #output::-webkit-scrollbar {
            width: 8px;
        }
        #output::-webkit-scrollbar-track {
            background: var(--term-dark);
        }
        #output::-webkit-scrollbar-thumb {
            background: var(--term-dim);
            border-radius: 4px;
        }

        .log-entry {
            border-bottom: 1px dashed var(--term-dim);
            padding: 10px 0;
            margin-bottom: 10px;
        }

        .meta {
            color: var(--term-dim);
            font-size: 0.85em;
            margin-bottom: 5px;
        }

        #input-container {
            border-top: 2px dashed var(--term-green);
            padding-top: 20px;
            flex-shrink: 0;
        }

        .input-line {
            display: flex;
            align-items: flex-start;
            position: relative;
            width: 100%;
        }

        .prompt {
            margin-right: 10px;
            white-space: nowrap;
            line-height: 1.2;
            flex-shrink: 0;
        }

        .input-wrapper {
            position: relative;
            flex-grow: 1;
        }

        input[type="password"], textarea {
            background: transparent;
            border: none;
            color: var(--term-green);
            font-family: 'Courier New', Courier, monospace;
            font-size: 1em;
            outline: none;
            width: 100%;
            caret-color: transparent;
            margin: 0;
            padding: 0;
            line-height: 1.2;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        textarea {
            resize: none;
            height: 80px;
        }

        .block-cursor {
            position: absolute;
            background: var(--term-green);
            width: 12px;
            height: 18px;
            pointer-events: none;
            display: block;
        }

        #hidden-measure {
            position: absolute;
            visibility: hidden;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1em;
            line-height: 1.2;
            top: 0;
            left: 0;
        }

        #viewer-live {
            color: #ffff33;
            font-style: italic;
            border-top: 1px dashed #ffff33;
            padding-top: 10px;
            margin-top: 10px;
            min-height: 25px;
            display: none;
        }

        #admin-zone {
            border-top: 2px dashed var(--term-green);
            padding-top: 20px;
            flex-shrink: 0;
            display: none;
            max-height: 40vh;
            overflow-y: auto;
        }

        .admin-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--term-dim);
            padding: 8px 0;
        }

        .admin-text {
            max-width: 70%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .delete-btn {
            background: #200000;
            border: 1px solid #ff3333;
            color: #ff3333;
            padding: 2px 8px;
            cursor: pointer;
            font-family: 'Courier New', Courier, monospace;
        }

        .delete-btn:hover {
            background: #ff3333;
            color: #000000;
        }
    </style>
</head>
<body>

<div id="terminal">
    <div id="output"></div>

    <div id="hidden-measure"></div>

    <div id="input-container">
        <!-- Auth Zone -->
        <div class="input-line" id="auth-zone">
            <span class="prompt">CLEARANCE_CODE ></span>
            <div class="input-wrapper">
                <input type="password" id="clearance-input" autofocus autocomplete="off">
                <div id="auth-cursor" class="block-cursor"></div>
            </div>
        </div>

        <!-- Write Zone -->
        <div class="input-line" id="write-zone" style="display: none;">
            <span class="prompt">INPUT_LOG ></span>
            <div class="input-wrapper">
                <textarea id="log-input" placeholder="Schreibe direkt im Terminal... (STRG+ENTER speichert, /clear setzt zurück)"></textarea>
                <div id="write-cursor" class="block-cursor"></div>
            </div>
        </div>

        <!-- Live-Anzeige für Zuschauer -->
        <div id="viewer-live"></div>
    </div>

    <!-- Admin Control Zone -->
    <div id="admin-zone">
        <div style="color: #ff3333; margin-bottom: 15px;">--- ADMIN CONTROL PANEL (RISKY_DELETE) ---</div>
        <div id="admin-list"></div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io('https://onrender.com');

    const authZone = document.getElementById('auth-zone');
    const writeZone = document.getElementById('write-zone');
    const adminZone = document.getElementById('admin-zone');
    const clearanceInput = document.getElementById('clearance-input');
    const logInput = document.getElementById('log-input');
    const output = document.getElementById('output');
    const viewerLive = document.getElementById('viewer-live');
    const adminList = document.getElementById('admin-list');
    
    const authCursor = document.getElementById('auth-cursor');
    const writeCursor = document.getElementById('write-cursor');
    const hiddenMeasure = document.getElementById('hidden-measure');

    let allEntries = [];
    let isAuthor = false;

    function trackCursor(inputEl, cursorEl) {
        const text = inputEl.value;
        hiddenMeasure.style.width = inputEl.clientWidth + 'px';
        
        hiddenMeasure.textContent = text;
        
        const span = document.createElement('span');
        span.textContent = 'X';
        hiddenMeasure.appendChild(span);
        
        cursorEl.style.left = span.offsetLeft + 'px';
        cursorEl.style.top = span.offsetTop + 'px';
        hiddenMeasure.removeChild(span);
    }

    clearanceInput.addEventListener('input', (e) => {
        trackCursor(clearanceInput, authCursor);
        const val = e.target.value.trim();
        if (val === 'Risky_Live') {
            isAuthor = true;
            authZone.style.display = 'none';
            adminZone.style.display = 'none';
            viewerLive.style.display = 'none';
            writeZone.style.display = 'flex';
            
            const savedBuffer = localStorage.getItem('diary_buffer');
            if (savedBuffer) {
                logInput.value = savedBuffer;
            }
            logInput.focus();
            setTimeout(() => trackCursor(logInput, writeCursor), 10);
        } else if (val === 'Risky_Delete') {
            isAuthor = true;
            authZone.style.display = 'none';
            writeZone.style.display = 'none';
            viewerLive.style.display = 'none';
            adminZone.style.display = 'block';
            renderAdminList();
        }
    });

    logInput.addEventListener('input', (e) => {
        trackCursor(logInput, writeCursor);
        const text = e.target.value;
        localStorage.setItem('diary_buffer', text);
        socket.emit('typing', { text: text });
    });

    logInput.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key === 'Enter') {
            e.preventDefault();
            handleSave();
        } else {
            setTimeout(() => trackCursor(logInput, writeCursor), 5);
        }
    });

    logInput.addEventListener('keyup', () => trackCursor(logInput, writeCursor));
    logInput.addEventListener('click', () => trackCursor(logInput, writeCursor));
    logInput.addEventListener('focus', () => trackCursor(logInput, writeCursor));
    clearanceInput.addEventListener('focus', () => trackCursor(clearanceInput, authCursor));

    function handleSave() {
        const text = logInput.value;
        if (!text) return;

        if (text.trim() === '/clear') {
            logInput.value = '';
            trackCursor(logInput, writeCursor);
            localStorage.removeItem('diary_buffer');
            socket.emit('typing', { text: '' });
            return;
        }

        socket.emit('new_entry', { text: text });
        logInput.value = '';
        trackCursor(logInput, writeCursor);
        localStorage.removeItem('diary_buffer');
    }

    function formatDate(isoString) {
        const d = new Date(isoString);
        return d.toLocaleString('de-DE');
    }

    function renderLogs(entries) {
        output.innerHTML = '';
        entries.forEach(entry => {
            const div = document.createElement('div');
            div.className = 'log-entry';
            div.innerHTML = `
[TIMESTAMP: ${formatDate(entry.timestamp)}] [ID: ${entry.id}]
${entry.text}
`;
output.appendChild(div);
});
output.scrollTop = output.scrollHeight;
}

function renderAdminList() {
adminList.innerHTML = '';
if (allEntries.length === 0) {
adminList.innerHTML = 'Keine Einträge vorhanden.';
return;
}
allEntries.forEach(entry => {
const div = document.createElement('div');
div.className = 'admin-item';
div.innerHTML = <div class="admin-text">[${formatDate(entry.timestamp)}] ${entry.text}</div> <button class="delete-btn" onclick="deleteLog('${entry.id}')">[DELETE_LOG]</button>;
adminList.appendChild(div);
});
}

window.deleteLog = function(id) {
if (confirm(Eintrag ${id} wirklich löschen?)) {
socket.emit('delete_entry', id);
}
};

socket.on('init', (entries) => {
allEntries = entries;
renderLogs(entries);
if (adminZone.style.display === 'block') {
renderAdminList();
}
});

socket.on('entry_added', (entries) => {
allEntries = entries;
renderLogs(entries);
if (adminZone.style.display === 'block') {
renderAdminList();
}
});

socket.on('entry_deleted', (entries) => {
allEntries = entries;
renderLogs(entries);
if (adminZone.style.display === 'block') {
renderAdminList();
}
});

socket.on('typing', (data) => {
if (!isAuthor) {
if (data.text && data.text.trim().length > 0) {
viewerLive.style.display = 'block';
viewerLive.textContent = "USER IS TYPING LIVE: " + data.text + "█";
} else {
viewerLive.style.display = 'none';
viewerLive.textContent = "";
}
}
});

trackCursor(clearanceInput, authCursor);
