<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiniKI v1.1</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    height:100vh;
    background:#212121;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
    display:flex;
}


/* Seitenleiste */

.sidebar{

    width:260px;
    background:#171717;
    padding:15px;
    display:flex;
    flex-direction:column;

}


.logo{

    font-size:22px;
    font-weight:bold;
    margin-bottom:20px;

}


.new{

    background:#2f2f2f;
    border:1px solid #555;
    padding:12px;
    border-radius:8px;
    cursor:pointer;
    color:white;

}


.info{

    margin-top:auto;
    color:#aaa;
    font-size:13px;

}


/* Hauptbereich */

.main{

    flex:1;
    display:flex;
    flex-direction:column;

}


/* Chat */

#chat{

    flex:1;
    overflow-y:auto;
    padding:30px;

}


.message{

    max-width:800px;
    margin:auto;
    padding:18px;
    line-height:1.5;

}


.user{

    background:#2f2f2f;
    border-radius:12px;
    margin-bottom:15px;

}


.ai{

    background:#444;
    border-radius:12px;
    margin-bottom:15px;

}


/* Eingabe */

.input-area{

    padding:20px;
    display:flex;
    justify-content:center;

}


.input-box{

    width:80%;
    max-width:850px;
    background:#2f2f2f;
    border-radius:15px;
    display:flex;
    padding:10px;

}


input{

    flex:1;
    background:none;
    border:0;
    outline:none;
    color:white;
    font-size:16px;

}


button{

    background:#10a37f;
    border:0;
    color:white;
    padding:10px 18px;
    border-radius:10px;
    cursor:pointer;

}


button:hover{

    background:#13c896;

}


</style>

</head>


<body>


<div class="sidebar">

<div class="logo">
🤖 MiniKI
</div>


<button class="new">
+ Neuer Chat
</button>


<div class="info">

MiniKI v1.1<br>
Eigenes JSON Modell

</div>


</div>



<div class="main">


<div id="chat">


<div class="message ai">

Hallo! Ich bin MiniKI v1.1.<br>
Wie kann ich dir helfen?

</div>


</div>



<div class="input-area">

<div class="input-box">

<input id="msg" placeholder="Nachricht an MiniKI...">


<button onclick="send()">
➤
</button>


</div>

</div>



</div>




<script>


async function send(){

let input=document.getElementById("msg");

let text=input.value.trim();

if(!text)return;


chat.innerHTML +=
`
<div class="message user">
${text}
</div>
`;


input.value="";


let response=await fetch("/api/chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

message:text

})

});


let data=await response.json();



chat.innerHTML +=
`
<div class="message ai">
${data.answer}
</div>
`;



chat.scrollTop=chat.scrollHeight;


}



</script>


</body>
</html>
