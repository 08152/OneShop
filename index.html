<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OrangeShop</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#fff3e6;
}


/* Kopf */

header{

height:80px;
background:#ff8c00;
display:flex;
align-items:center;
gap:15px;
padding:15px;
box-shadow:0 3px 10px #aaa;

}


.logo{

font-size:28px;
font-weight:bold;
color:white;

}


/* Suche */

.search{

flex:1;
display:flex;

}


.search input{

flex:1;
padding:12px;
border:none;
border-radius:10px 0 0 10px;
font-size:16px;

}


.search button{

padding:12px 20px;
border:none;
background:#e66f00;
color:white;
font-size:18px;
cursor:pointer;
border-radius:0 10px 10px 0;

}



/* Icons */


.icon{

width:45px;
height:45px;
background:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:25px;
cursor:pointer;

}



/* Account Menü */

#accountMenu{

display:none;
position:fixed;
right:20px;
top:90px;
background:white;
width:280px;
padding:20px;
border-radius:15px;
box-shadow:0 5px 20px #777;
z-index:10;

}


.close{

float:right;
font-size:25px;
cursor:pointer;

}


#accountMenu button{

width:100%;
margin-top:15px;
padding:12px;
border:none;
border-radius:10px;
background:#ff8c00;
color:white;
font-size:16px;
cursor:pointer;

}




main{

padding:40px;
text-align:center;

}


</style>

</head>



<body>



<header>


<div class="logo">
🟧 OrangeShop
</div>



<div class="search">

<input id="searchInput" placeholder="Suchen...">

<button onclick="search()">
🔎
</button>

</div>



<div class="icon" onclick="accountClick()">
👤
</div>



<div class="icon" onclick="cart()">
🛒
</div>



</header>




<div id="accountMenu">


<span class="close" onclick="closeMenu()">
✖
</span>


<h2>
Konto
</h2>


<br>


<button>
Konto verbinden
</button>



<button onclick="addArticle()">
Artikel hinzufügen
</button>



<button onclick="logout()">
Ausloggen
</button>



</div>





<main>


<h1>
Willkommen bei OrangeShop
</h1>


<br>


<p>
Dein Online-Shop
</p>


</main>







<script>



// Suche

function search(){

let value=
document.getElementById("searchInput").value;


alert("Suche nach: "+value);


}




// Einkaufswagen

function cart(){

window.location.href="1.html";

}





// Account öffnen

function accountClick(){


let logged=
localStorage.getItem("loggedIn");


if(logged==="true"){


document.getElementById("accountMenu").style.display="block";


}

else{


window.location.href="2.html";


}


}




// Menü schließen

function closeMenu(){

document.getElementById("accountMenu").style.display="none";

}





// Artikel hinzufügen

function addArticle(){

window.location.href="3.html";

}





// Ausloggen

function logout(){


localStorage.removeItem("loggedIn");


closeMenu();


alert("Du wurdest ausgeloggt");


}





</script>



</body>
</html>
