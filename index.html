<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL // LIVE_DIARY</title>
    <style>
        :root {
            --color-bg: #0a0a0a;
            --color-terminal: #00ff33;
            --color-dim: #003300;
            --font-terminal: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--color-bg);
            color: var(--color-terminal);
            font-family: var(--font-terminal);
            margin: 0;
            padding: 20px;
        }

        #terminal {
            max-width: 900px;
            margin: 0 auto;
            border: 1px solid var(--color-terminal);
            padding: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 51, 0.2);
        }

        header {
            border-bottom: 1px dashed var(--color-terminal);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        h1 { font-size: 1.5rem; margin: 0; }
        
        .status-bar {
            font-size: 0.8rem;
            color: #00aa22;
            display: flex;
            justify-content: space-between;
        }

        /* Schreibbereich oben - Standardmäßig unsichtbar */
        #write-zone {
            display: none;
            margin-bottom: 30px;
            border-bottom: 1px dashed var(--color-dim);
            padding-bottom: 20px;
        }

        /* Custom Editor für den dicken grünen Block-Cursor */
        .terminal-editor-container {
            position: relative;
            width: 100%;
            min-height: 120px;
            background: #000;
            border: 1px solid var(--color-terminal);
            padding: 10px;
            box-sizing: border-box;
            cursor: text;
        }

        /* Unsichtbare echte Textarea, die den Input abfängt */
        #hidden-textarea {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0;
            cursor: text;
            resize: none;
            border: none;
        }

        /* Sichtbarer Text-Spiegel */
        #visual-text {
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.5;
            color: var(--color-terminal);
            display: inline;
        }

        /* Dicker grüner Balken als Cursor (kein Blinken) */
        .custom-cursor {
            display: inline-block;
            width: 10px;
            height: 18px;
            background-color: var(--color-terminal);
            vertical-align: middle;
            margin-left: 2px;
        }

        /* Log-Einträge Verlauf */
        .log-entry {
            border-left: 2px solid var(--color-terminal);
            padding-left: 15px;
            margin-bottom: 25px;
        }

        .log-date { font-weight: bold; color: #fff; margin-bottom: 5px; }
        .log-text { line-height: 1.6; white-space: pre-wrap; }

        /* Auth-Sektion unten */
        #auth-zone {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px dashed var(--color-terminal);
        }

        .prompt-line { display: flex; align-items: center; }
        .prompt { color: var(--color-terminal); margin-right: 10px; }
        
        #auth-code {
            background: transparent; border: none; color: var(--color-terminal);
            font-family: var(--font-terminal); font-size: 1rem; width: 100%; outline: none;
            /* Blauer Cursor auch hier verstecken, stattdessen Fake-Balken möglich, hier simpel gelöst: */
            caret-color: var(--color-terminal);
        }

        .sync-indicator { font-size: 0.8rem; color: #ff9900; }
        .online { color: var(--color-terminal); }
    </style>
    <!-- Socket.io für Live-Übertragung laden -->
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

<div id="terminal">
    <header>
        <h1>SECURE_LIVE_DIARY_v2.0</h1>
        <div class="status-bar">
            <div>STATUS: <span id="server-status">CONNECTING...</span></div>
            <div id="sync-status" class="sync-indicator">Lokal gesichert</div>
        </div>
    </header>

    <!-- SCHREIBBEREICH (Wird nach Code-Eingabe OBEN angezeigt) -->
    <div id="write-zone">
        <div class="prompt" style="margin-bottom: 5px;">[LIVE_STREAM_ACTIVE] SCHREIBE NEUEN EINTRAG:</div>
        <div class="terminal-editor-container" onclick="focusEditor()">
            <span id="visual-text"></span><span class="custom-cursor"></span>
            <textarea id="hidden-textarea" oninput="updateText(this.value)" onkeydown="handleKeys(event)"></textarea>
        </div>
        <button onclick="submitLog()" style="background:transparent; border:1px solid var(--color-terminal); color:var(--color-terminal); padding:8px 15px; margin-top:10px; cursor:pointer; font-family:var(--font-terminal);">LOG_SPEICHERN (STRG+ENTER)</button>
    </div>

    <!-- LOG VERLAUF -->
    <main id="log-container">
        <!-- Logs werden hier gerendert -->
    </main>

    <!-- AUTH-BEREICH (Verschwindet nach Aktivierung) -->
    <div id="auth-zone">
        <div class="prompt-line">
            <span class="prompt">guest@fsociety:~# enter_clearance_code:</span>
            <input type="text" id="auth-code" autocomplete="off" onkeydown="checkAuth(event)">
        </div>
    </div>
</div>

<script>
    const socket = io();
    let isAuthorized = false;

    // Synchronisations-Logik bei Server-Schlaf/Wachwechsel
    socket.on('connect', () => {
        document.getElementById('server-status').textContent = "ONLINE (LIVE)";
        document.getElementById('server-status').className = "online";
        syncLocalToServer(); // Wenn Server aufwacht, lokale Daten hochladen
    });

    socket.on('disconnect', () => {
        document.getElementById('server-status').textContent = "OFFLINE (SERVER_SLEEP)";
        document.getElementById('server-status').className = "";
    });

    // Empfange Live-Einträge von anderen Sendern in Echtzeit
    socket.on('live_type', (data) => {
        let liveDiv = document.getElementById('live-broadcast-preview');
        if (!liveDiv) {
            liveDiv = document.createElement('div');
            liveDiv.id = 'live-broadcast-preview';
            liveDiv.style.border = '1px dashed #ff3333';
            liveDiv.style.padding = '10px';
            liveDiv.style.marginBottom = '20px';
            document.getElementById('log-container').prepend(liveDiv);
        }
        liveDiv.innerHTML = `<div style="color:#ff3333; font-size:0.8rem;">[REMOTE_USER_TYPING...]</div><div>${data.text}</div>`;
        if(data.text === "") liveDiv.remove();
    });

    socket.on('update_logs', (logs) => {
        renderLogs(logs);
        // Wenn ein Live-Vorschau-Fenster existierte, nach dem Speichern entfernen
        const liveDiv = document.getElementById('live-broadcast-preview');
        if(liveDiv) liveDiv.remove();
    });

    // Editor-Steuerung
    function focusEditor() {
        document.getElementById('hidden-textarea').focus();
    }

    function updateText(val) {
        document.getElementById('visual-text').textContent = val;
        
        // 1. Live im LocalStorage sichern (falls Server weg ist)
        localStorage.setItem('diary_current_buffer', val);
        
        // 2. Live per WebSocket an alle anderen senden
        socket.emit('typing', { text: val });
    }

    function handleKeys(e) {
        // STRG + ENTER zum Absenden
        if (e.ctrlKey && e.key === 'Enter') {
            submitLog();
        }
    }

    // Code-Prüfung
    function checkAuth(e) {
        if (e.key === 'Enter') {
            const input = document.getElementById('auth-code');
            if (input.value === 'Risky_Live') {
                isAuthorized = true;
                
                // 1. Code-Bereich komplett löschen/verstecken
                document.getElementById('auth-zone').style.display = 'none';
                
                // 2. Schreibbereich OBEN einblenden
                document.getElementById('write-zone').style.display = 'block';
                
                // Vorhandenen Buffer aus LocalStorage wiederherstellen (falls vorhanden)
                const savedBuffer = localStorage.getItem('diary_current_buffer') || "";
                document.getElementById('hidden-textarea').value = savedBuffer;
                updateText(savedBuffer);
                
                focusEditor();
            } else {
                input.value = '';
                alert("ZUGRIFF VERWEIGERT");
            }
        }
    }

    function renderLogs(logs) {
        const container = document.getElementById("log-container");
        container.innerHTML = "";
        logs.forEach(log => {
            container.innerHTML += `
                <div class="log-entry">
                    <div class="log-date">${log.date}</div>
                    <div class="log-text">${log.text}</div>
                </div>`;
        });
    }

    // Eintrag abschicken
    function submitLog() {
        const textarea = document.getElementById('hidden-textarea');
        const text = textarea.value.trim();
        if(!text) return;

        const now = new Date();
        const timestamp = `[ LOG_DATE: ${now.toISOString().split('T')[0]} // ${now.toTimeString().split(' ')[0]} ]`;
        
        const newLog = { date: timestamp, text: text };

        // Im LocalStorage in die Warteschlange einreihen
        let offlineQueue = JSON.parse(localStorage.getItem('diary_offline_queue')) || [];
        offlineQueue.push(newLog);
        localStorage.setItem('diary_offline_queue', JSON.stringify(offlineQueue));

        // Buffer leeren
        textarea.value = "";
        updateText("");
        localStorage.removeItem('diary_current_buffer');
        socket.emit('typing', { text: "" }); // Live-Vorschau bei anderen leeren
// Direkt versuchen zu synchronisieren
syncLocalToServer();
}

// Warteschlange an Server senden, sobald er da ist
async function syncLocalToServer() {
let offlineQueue = JSON.parse(localStorage.getItem('diary_offline_queue')) || [];
if(offlineQueue.length === 0) return;

document.getElementById('sync-status').textContent = "SYNCHRONISIERE MIT SERVER...";

try {
const response = await fetch('/api/logs/sync', {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({ entries: offlineQueue })
});

if (response.ok) {
localStorage.setItem('diary_offline_queue', JSON.stringify([]));
document.getElementById('sync-status').textContent = "ALLE DATEN AUF SERVER GESICHERT";
// Server triggert über WebSockets ein Update der Logliste für alle
}
} catch (e) {
document.getElementById('sync-status').textContent = "SERVER SCHLÄFT - LOKAL GEPUFFERT";
}
}
