<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Timeline Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🎛️ Audio Drag & Drop Studio</h1>

    <div class="studio-container">
        
        <!-- Linke Seite: Soundpool & Aufnahme -->
        <div class="sound-pool">
            <h2>Soundpool</h2>
            <p class="hint">Klicke zum Anhören. Ziehe das <b>[DRAG]</b>-Feld mit der Maus direkt auf eine Spur in der Timeline.</p>
            
            <!-- Mikrofon Aufnahme -->
            <div class="mic-section">
                <h3>🎙️ Eigene Stimme</h3>
                <button id="micBtn" class="mic-btn">Aufnahme starten</button>
                <div id="micSounds" class="sound-grid"></div>
            </div>

            <!-- Gitarre -->
            <div class="instrument-section">
                <div class="instrument-title">🎸 Gitarre (5 Sounds)</div>
                <div class="sound-grid" id="pool-gitarre"></div>
            </div>

            <!-- Trommel -->
            <div class="instrument-section">
                <div class="instrument-title">🥁 Trommel (5 Sounds)</div>
                <div class="sound-grid" id="pool-trommel"></div>
            </div>

            <!-- Piano -->
            <div class="instrument-section">
                <div class="instrument-title">🎹 Piano (15 Sounds)</div>
                <div class="sound-grid" id="pool-piano"></div>
            </div>

            <!-- Beats -->
            <div class="instrument-section">
                <div class="instrument-title">⚡ Elektrische Beats (20 Sounds)</div>
                <div class="sound-grid" id="pool-beat"></div>
            </div>
        </div>

        <!-- Rechte Seite: Timeline & Controls -->
        <div class="main-area">
            <div class="controls">
                <button class="control-btn play-btn" onclick="playTimeline()">▶ Abspielen</button>
                <button class="control-btn stop-btn" onclick="stopTimeline()">⏹ Stopp</button>
                <button class="control-btn clear-btn" onclick="clearTimeline()">🗑 Leeren</button>
                <div class="track-add-control">
                    <label>Spur hinzufügen:</label>
                    <button class="add-track-btn" onclick="addTrackRow()">+</button>
                </div>
                <div class="timeline-length-control">
                    <label for="timelineLength">Gesamtlänge (Sekunden):</label>
                    <input type="number" id="timelineLength" value="10" min="5" max="60" onchange="updateTimelineLength()">
                </div>
            </div>

            <div class="timeline-container">
                <div class="timeline-tracks" id="timelineTracks">
                    <div id="playhead"></div>
                    <!-- Spuren (Tracks) werden dynamisch generiert -->
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Menü / Modal Window -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal()"></div>
    <div class="modal" id="editModal">
        <h3 id="modalTitle">Sound bearbeiten</h3>
        
        <label>Startzeitpunkt (Sekunden):</label>
        <input type="range" id="modStart" min="0" max="10" step="0.1">
        <span id="modStartVal" style="font-size:0.85em; color:#aaa;">0s</span>
        
        <label>Länge (Dauer in Sekunden):</label>
        <input type="range" id="modDuration" min="0.1" max="4.0" step="0.1">
        <span id="modDurationVal" style="font-size:0.85em; color:#aaa;">0.8s</span>
        
        <label>Lautstärke (Volume):</label>
        <input type="range" id="modVolume" min="0" max="1" step="0.1">

        <label id="pitchLabel">Klangfarbe / Tonhöhe:</label>
        <select id="modPitch">
            <option value="low">Tief</option>
            <option value="normal" selected>Normal</option>
            <option value="high">Hoch</option>
        </select>

        <div class="modal-buttons">
            <!-- Gefordert: Löschen-Knopf direkt im Sound-Menü -->
            <button class="modal-btn btn-delete" onclick="deleteBlock()">🗑 Löschen</button>
            <button class="modal-btn btn-save" onclick="saveBlockSettings()">💾 Speichern</button>
        </div>
    </div>

    <!-- JavaScript Dateien laden -->
    <script src="sound.js"></script>
    <script src="script.js"></script>
</body>
</html>
