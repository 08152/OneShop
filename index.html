<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Ghost Studio DAW</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">

<h1>🎵 Ghost Studio DAW</h1>

<div class="controls">

<button id="playBtn">▶ Abspielen</button>

<button id="stopBtn">⏹ Stopp</button>

<button id="clearBtn">🗑 Leeren</button>

<button id="addTrackBtn">＋ Spur hinzufügen</button>

<button id="recordBtn">🎤 Aufnahme starten</button>

<label>

Timeline (Sek.)

<input
id="timelineLength"
type="number"
value="30"
min="5"
max="600">

</label>

</div>

</header>

<div class="layout">

<!-- ========================================= -->
<!-- LINKS: SOUNDPOOL -->
<!-- ========================================= -->

<aside id="soundPool">

<h2>🎼 Soundpool</h2>

<!-- ---------------- GITARRE ---------------- -->

<section class="category">

<h3>🎸 Gitarre</h3>

<div id="guitarList" class="soundList"></div>

</section>

<!-- ---------------- PIANO ---------------- -->

<section class="category">

<h3>🎹 Piano</h3>

<div id="pianoList" class="soundList"></div>

</section>

<!-- ---------------- DRUMS ---------------- -->

<section class="category">

<h3>🥁 Trommel</h3>

<div id="drumList" class="soundList"></div>

</section>

<!-- ---------------- ELEKTRO ---------------- -->

<section class="category">

<h3>⚡ Elektrische Beats</h3>

<div id="electroList" class="soundList"></div>

</section>

<!-- ---------------- STIMMEN ---------------- -->

<section class="category">

<h3>🎤 Aufnahmen</h3>

<div id="voiceList" class="soundList"></div>

</section>

</aside>

<!-- ========================================= -->
<!-- RECHTS: TIMELINE -->
<!-- ========================================= -->

<main id="workspace">

<div id="timeScale"></div>

<div id="timelineContainer">

<div class="track" data-track="0">

<div class="trackTitle">
Track 1
</div>

<div class="trackLane"></div>

</div>

<div class="track" data-track="1">

<div class="trackTitle">
Track 2
</div>

<div class="trackLane"></div>

</div>

<div class="track" data-track="2">

<div class="trackTitle">
Track 3
</div>

<div class="trackLane"></div>

</div>

<div class="track" data-track="3">

<div class="trackTitle">
Track 4
</div>

<div class="trackLane"></div>

</div>

<div id="playhead"></div>

</div>

</main>

</div>

<!-- ========================================= -->
<!-- DETAIL MENU -->
<!-- ========================================= -->

<div id="modal" class="hidden">

<div class="window">

<h2>Sound bearbeiten</h2>

<label>

Startzeit

<input
id="editStart"
type="range"
min="0"
max="120"
step="0.1">

<span id="startValue">0</span>

</label>

<label>

Dauer

<input
id="editDuration"
type="range"
min="0.1"
max="20"
step="0.1">

<span id="durationValue">1</span>

</label>

<label>

Lautstärke

<input
id="editVolume"
type="range"
min="0"
max="1"
step="0.01">

<span id="volumeValue">1</span>

</label>

<label>

Klangfarbe

<select id="editPitch">

<option value="0.5">
Tief
</option>

<option value="1" selected>
Normal
</option>

<option value="2">
Hoch
</option>

</select>

</label>

<div class="modalButtons">

<button id="deleteBlock">
🗑 Löschen
</button>

<button id="closeModal">
Schließen
</button>

</div>

</div>

</div>
<!-- ========================================= -->
<!-- DRAG-VORSCHAU -->
<!-- ========================================= -->

<div id="dragPreview" class="hidden">
    <span id="dragName">Sound</span>
</div>

<!-- ========================================= -->
<!-- STATUSLEISTE -->
<!-- ========================================= -->

<footer class="statusbar">

    <div>
        <strong>Status:</strong>
        <span id="statusText">Bereit</span>
    </div>

    <div>
        <strong>Spuren:</strong>
        <span id="trackCount">4</span>
    </div>

    <div>
        <strong>Sounds:</strong>
        <span id="soundCount">0</span>
    </div>

</footer>

<!-- ========================================= -->
<!-- TEMPLATES -->
<!-- ========================================= -->

<template id="soundTemplate">

    <div class="soundItem" draggable="true">

        <div class="soundName">
            Name
        </div>

        <div class="soundButtons">

            <button class="previewButton">
                ▶
            </button>

            <div class="dragHandle">
                DRAG
            </div>

        </div>

    </div>

</template>

<template id="timelineTemplate">

    <div class="timelineBlock">

        <div class="timelineName">
            Sound
        </div>

    </div>

</template>

<!-- ========================================= -->
<!-- SCRIPTS -->
<!-- ========================================= -->

<script src="sound.js"></script>
<script src="script.js"></script>

</body>
</html>
