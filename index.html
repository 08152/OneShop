<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>GhostShop</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f2f2f2;
    color:#222;
    overflow-x:hidden;
}


/* NAVIGATION */

header{
    height:70px;
    background:#111;
    color:white;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 25px;
    position:sticky;
    top:0;
    z-index:10;
    box-shadow:0 5px 20px #0005;
}


.logo{
    color:#ffd400;
    font-size:32px;
    font-weight:bold;
}


.cart-button{
    background:#ffd400;
    color:#111;
    border:none;
    border-radius:20px;
    padding:12px 20px;
    font-size:18px;
    cursor:pointer;
    touch-action:manipulation;
}


.cart-button:active{
    transform:scale(.95);
}



/* PRODUKTE */

.container{
    width:95%;
    max-width:1300px;
    margin:30px auto;
}


.products{
    display:grid;
    grid-template-columns:
    repeat(auto-fit,minmax(230px,1fr));
    gap:25px;
}



.card{

    background:white;
    border-radius:20px;
    padding:20px;
    box-shadow:0 10px 25px #0002;
    transition:.3s;

}


.card:hover{
    transform:translateY(-5px);
}



.card img{

    width:100%;
    height:180px;
    object-fit:contain;
}



.card h2{

    font-size:20px;
    margin:15px 0;

}


.price{

    color:#008000;
    font-size:22px;
    font-weight:bold;

}



.add{

    margin-top:15px;
    width:100%;
    padding:14px;
    border:none;
    border-radius:15px;
    background:#111;
    color:white;
    font-size:16px;
    cursor:pointer;
    touch-action:manipulation;

}


.add:active{

    transform:scale(.96);

}




/* WARENKORB */

.cart-panel{

    position:fixed;
    right:-420px;
    top:0;
    width:380px;
    max-width:95%;
    height:100%;
    background:white;
    z-index:20;
    box-shadow:-10px 0 30px #0005;
    transition:.4s;
    padding:20px;
    overflow-y:auto;

}


.cart-panel.open{

    right:0;

}



.close{

    float:right;
    font-size:30px;
    cursor:pointer;

}


.cart-item{

    display:flex;
    justify-content:space-between;
    margin:15px 0;
    padding:10px;
    background:#eee;
    border-radius:10px;

}



.order{

    width:100%;
    background:#ffd400;
    border:none;
    padding:15px;
    border-radius:15px;
    font-size:18px;
    cursor:pointer;

}



/* ADMIN */


.admin{

    display:none;
    position:fixed;
    inset:0;
    background:white;
    z-index:50;
    padding:30px;
    overflow:auto;

}



.admin-box{

    background:#eee;
    padding:20px;
    border-radius:20px;
    margin:15px 0;

}



.admin button{

    padding:10px;
    margin:5px;
    border:none;
    border-radius:10px;
    cursor:pointer;

}



/* PIN */

.pin{

    display:none;
    position:fixed;
    inset:0;
    background:#0009;
    z-index:40;
    align-items:center;
    justify-content:center;

}


.pin-box{

    background:white;
    padding:30px;
    border-radius:20px;
    text-align:center;

}


.pin input{

    padding:15px;
    font-size:25px;
    width:150px;
    text-align:center;

}




/* MOBILE */

@media(max-width:600px){

.logo{
    font-size:25px;
}

header{
    padding:0 12px;
}

.card img{
    height:140px;
}


}

</style>

</head>


<body>


<header>

<div class="logo">
GhostShop
</div>


<button class="cart-button" onclick="openCart()">
🛒 Warenkorb (<span id="count">0</span>)
</button>


</header>



<div class="container">

<h1>Produkte</h1>

<div class="products" id="products"></div>

</div>



<!-- WARENKORB -->


<div class="cart-panel" id="cart">

<span class="close" onclick="closeCart()">×</span>

<h1>Warenkorb</h1>

<div id="cartItems"></div>


<h2>
Gesamt:
<span id="total">
0.00
</span> €
</h2>


<button class="order" onclick="orderNow()">
Jetzt bestellen
</button>


</div>



<!-- PIN -->

<div class="pin" id="pin">

<div class="pin-box">

<h2>Admin PIN</h2>

<input id="pinInput" type="password">

<br><br>

<button onclick="checkPin()">
Öffnen
</button>


</div>

</div>



<!-- ADMIN -->


<div class="admin" id="admin">

<h1>
GhostShop Verwaltung
</h1>


<button onclick="closeAdmin()">
Schließen
</button>


<div id="orders"></div>


</div>



<script>


// PRODUKTE


let products=[

{
name:"Weihenstephan H-Milch 1L",
price:1.40,
img:"https://www.molkerei-weihenstephan.de/fileadmin/media/produkte/milch/haltbare_milch/hmilch_1l_35.png"
}

];



let cart=[];



function loadProducts(){

let box=document.getElementById("products");

box.innerHTML="";


products.forEach((p,i)=>{


box.innerHTML+=`

<div class="card">

<img src="${p.img}">

<h2>${p.name}</h2>

<div class="price">
${p.price.toFixed(2)} €
</div>

<button class="add" onclick="addCart(${i})">

In den Warenkorb

</button>

</div>

`;

});


}



loadProducts();




function addCart(i){

cart.push(products[i]);

updateCart();

}




function updateCart(){

document.getElementById("count").innerHTML=cart.length;


let box=document.getElementById("cartItems");

box.innerHTML="";


let sum=0;


cart.forEach((p)=>{

sum+=p.price;


box.innerHTML+=`

<div class="cart-item">

<span>${p.name}</span>

<span>${p.price.toFixed(2)}€</span>

</div>

`;

});


document.getElementById("total").innerHTML=sum.toFixed(2);


}
<script>


function openCart(){

document.getElementById("cart").classList.add("open");

}



function closeCart(){

document.getElementById("cart").classList.remove("open");

}





// BESTELLUNG SENDEN


async function orderNow(){


if(cart.length===0){

alert("Der Warenkorb ist leer!");

return;

}



let preis=0;


cart.forEach(p=>{

preis+=p.price;

});



let order={

datum:new Date().toLocaleString("de-DE"),

artikel:cart.map(p=>p.name),

preis:preis.toFixed(2),

status:"Neu"

};



try{


await fetch("/api/orders",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify(order)


});



alert("Bestellung erfolgreich gespeichert!");

cart=[];

updateCart();

closeCart();



}catch(e){


alert("Server nicht erreichbar");


}



}







// STRG ÖFFNET PIN


document.addEventListener("keydown",function(e){


if(e.ctrlKey){


document.getElementById("pin").style.display="flex";


}



});






function checkPin(){


let p=document.getElementById("pinInput").value;


if(p==="0123"){


document.getElementById("pin").style.display="none";


document.getElementById("admin").style.display="block";


loadOrders();


}

else{


alert("Falsche PIN");


}



}








// ADMIN BESTELLUNGEN


async function loadOrders(){


let res=await fetch("/api/orders");


let orders=await res.json();



let box=document.getElementById("orders");


box.innerHTML="";



orders.forEach(o=>{


box.innerHTML+=`

<div class="admin-box">

<h2>Bestellung ${o.id}</h2>


<p>
Datum:
${o.datum}
</p>


<p>
Artikel:
${o.artikel.join(", ")}
</p>


<p>
Preis:
${o.preis} €
</p>


<p>
Status:
${o.status}
</p>



<button onclick="printList(${o.id})">

Einkaufszettel drucken

</button>


<button onclick="printBill(${o.id})">

Rechnung drucken

</button>



<button onclick="deleteOrder(${o.id})">

Erledigen

</button>


</div>


`;


});



}







function closeAdmin(){


document.getElementById("admin").style.display="none";


}








async function deleteOrder(id){


await fetch("/api/orders/"+id,{

method:"DELETE"

});


loadOrders();


}








// DRUCK FUNKTIONEN



async function getOrder(id){


let res=await fetch("/api/orders");

let data=await res.json();


return data.find(o=>o.id===id);


}





async function printList(id){


let o=await getOrder(id);


let w=window.open("");


w.document.write(`


<h1>GhostShop Einkaufszettel</h1>

<h3>Artikel:</h3>

<p>${o.artikel.join("<br>")}</p>


`);


w.print();


}






async function printBill(id){


let o=await getOrder(id);


let w=window.open("");


w.document.write(`


<h1>GhostShop Rechnung</h1>


<p>
Datum:
${o.datum}
</p>


<p>

Artikel:

<br>

${o.artikel.join("<br>")}

</p>


<h2>

Gesamt:
${o.preis} €

</h2>


<p>
Vielen Dank für Ihren Einkauf.
</p>


`);



w.print();



}






// TOUCH OPTIMIERUNG


document.addEventListener(

"touchstart",

function(){},

{passive:true}

);



// automatisch neu laden bei Änderung


window.addEventListener("resize",()=>{

document.body.style.minHeight=window.innerHeight+"px";

});



</script>


</body>
</html>
