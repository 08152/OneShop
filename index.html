<!DOCTYPE html><html lang='de'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Live Chat</title><style>body{margin:0;background:#111;color:#0f0;font-family:monospace}#log{height:90vh;overflow:auto;padding:10px}input{width:100%;padding:10px;box-sizing:border-box;background:#000;color:#0f0;border:none}</style></head><body><div id='log'></div><input id='input' placeholder='PIN oder Nachricht'><script src='/socket.io/socket.io.js'></script><script>const s=io(),l=document.getElementById('log'),i=document.getElementById('input');let ok=false;const add=t=>{l.innerHTML+=t+'<br>';l.scrollTop=l.scrollHeight};s.on('history',h=>{l.innerHTML='';h.forEach(add)});s.on('line',add);i.onkeydown=e=>{if(e.key!=='Enter')return;let t=i.value.trim();i.value='';if(!ok){if(t==='Risky_Live'){ok=true;add('[PIN akzeptiert]')}return;}if(t)s.emit('line',t);};</script></body></html>
