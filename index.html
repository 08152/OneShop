<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ghost Studio DAW</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header class="topbar">

<h1>🎵 Ghost Studio DAW</h1>


<div class="controls">


<button id="playBtn">
▶ Abspielen
</button>


<button id="stopBtn">
⏹ Stopp
</button>


<button id="clearBtn">
🗑 Leeren
</button>


<button id="addTrackBtn">
➕ Spur hinzufügen
</button>


<button id="recordBtn">
🎤 Aufnahme starten
</button>



<label>

Länge:

<input
id="timelineLength"
type="number"
value="30"
min="5"
>

Sekunden

</label>


</div>


</header>






<div class="layout">



<!-- =========================
 SOUNDPOOL
========================= -->


<aside id="soundPool">


<h2>
🎼 Soundpool
</h2>



<div class="category">

<h3>
🎸 Gitarre
</h3>


<div id="guitarList"
class="soundList">
</div>

</div>





<div class="category">

<h3>
🎹 Piano
</h3>


<div id="pianoList"
class="soundList">
</div>

</div>






<div class="category">

<h3>
🥁 Trommel
</h3>


<div id="drumList"
class="soundList">
</div>

</div>







<div class="category">

<h3>
⚡ Elektrische Beats
</h3>


<div id="electroList"
class="soundList">
</div>

</div>






<div class="category">

<h3>
🎤 Stimmen
</h3>


<div id="voiceList"
class="soundList">
</div>

</div>



</aside>









<!-- =========================
 TIMELINE
========================= -->


<main id="workspace">


<div id="timeScale">

</div>




<div id="timelineContainer">



<div class="track">


<div class="trackTitle">
Track 1
</div>


<div class="trackLane">
</div>


</div>





<div class="track">


<div class="trackTitle">
Track 2
</div>


<div class="trackLane">
</div>


</div>





<div class="track">


<div class="trackTitle">
Track 3
</div>


<div class="trackLane">
</div>


</div>





<div class="track">


<div class="trackTitle">
Track 4
</div>


<div class="trackLane">
</div>


</div>





<div id="playhead">

</div>



</div>



</main>




</div>
<!-- =====================================
     SOUND PLATZIEREN FENSTER
===================================== -->


<div id="placeModal" class="hidden">


<div class="window">


<h2>
🎵 Sound platzieren
</h2>



<p id="placeSoundName">
Sound
</p>



<label>

Startzeit in Sekunden:

<input
id="placeTime"
type="number"
min="0"
step="0.1"
value="0">

</label>




<label>

Spur:

<select id="placeTrack">


<option value="0">
Track 1
</option>


<option value="1">
Track 2
</option>


<option value="2">
Track 3
</option>


<option value="3">
Track 4
</option>


</select>

</label>





<div class="modalButtons">


<button id="placeConfirm">

✅ Einfügen

</button>



<button id="placeCancel">

❌ Abbrechen

</button>


</div>


</div>


</div>








<!-- =====================================
     SOUND BEARBEITEN FENSTER
===================================== -->


<div id="editModal" class="hidden">


<div class="window">


<h2>
🎚 Sound bearbeiten
</h2>



<p id="editSoundName">
Sound
</p>





<label>

Lautstärke:

<input
id="editVolume"
type="range"
min="0"
max="1"
step="0.01"
value="1">


<span id="volumeValue">
1
</span>


</label>








<label>

Tonhöhe:

<select id="editPitch">


<option value="0.5">
Tief
</option>


<option value="1"
selected>
Normal
</option>


<option value="2">
Hoch
</option>


</select>


</label>








<label>

Geschwindigkeit:

<input
id="editSpeed"
type="range"
min="0.5"
max="2"
step="0.01"
value="1">


<span id="speedValue">
1x
</span>


</label>








<div class="modalButtons">


<button id="deleteBlock">

🗑 Löschen

</button>



<button id="closeEdit">

Schließen

</button>


</div>



</div>


</div>









<!-- =====================================
 STATUS BAR
===================================== -->


<footer class="statusbar">


<span>
Status:
</span>


<span id="statusText">
Bereit
</span>




<span>
Spuren:
</span>


<span id="trackCount">
4
</span>




<span>
Sounds:
</span>


<span id="soundCount">
0
</span>



</footer>









<!-- =====================================
 JAVASCRIPT
===================================== -->


<script src="sound.js"></script>

<script src="script.js"></script>



</body>

</html>
