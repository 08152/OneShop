<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine Zoom-Alternative</title>
    <!-- Jitsi Meet externe API laden -->
    <script src="https://jit.si"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }
        #setup-container {
            margin-top: 50px;
            text-align: center;
            background: #2a2a2a;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        input, button {
            padding: 10px 15px;
            font-size: 16px;
            margin: 10px;
            border-radius: 4px;
            border: none;
        }
        input {
            width: 250px;
        }
        button {
            background-color: #0e71eb;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #0b5cb8;
        }
        #meet-container {
            width: 100%;
            flex-grow: 1;
            display: none;
        }
    </style>
</head>
<body>

    <!-- Startbildschirm zur Raumeingabe -->
    <div id="setup-container">
        <h2>Videokonferenz starten</h2>
        <p>Geben Sie einen Raumnamen ein, um ein Meeting zu starten oder beizutreten:</p>
        <input type="text" id="room-name" placeholder="z. B. mein-super-meeting-123">
        <br>
        <button onclick="startMeeting()">Meeting beitreten</button>
    </div>

    <!-- Container für das Videobild -->
    <div id="meet-container"></div>

    <script>
        function startMeeting() {
            const roomInput = document.getElementById('room-name').value.trim();
            if (!roomInput) {
                alert('Bitte geben Sie einen Raumnamen ein!');
                return;
            }

            // Sicherstellen, dass der Raumname URL-konform ist
            const cleanRoomName = encodeURIComponent(roomInput);

            // Interface anpassen
            document.getElementById('setup-container').style.display = 'none';
            const container = document.getElementById('meet-container');
            container.style.display = 'block';

            // Jitsi Meet Optionen konfigurieren
            const domain = "meet.jit.si";
            const options = {
                roomName: cleanRoomName,
                width: "100%",
                height: "100%",
                parentNode: container,
                lang: "de",
                interfaceConfigOverwrite: {
                    // Hier können Sie UI-Elemente anpassen falls gewünscht
                },
                configOverwrite: {
                    startWithAudioMuted: false,
                    startWithVideoMuted: false
                }
            };

            // Meeting instanziieren
            const api = new JitsiMeetExternalAPI(domain, options);
        }
    </script>
</body>
</html>
