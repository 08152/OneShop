<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Secure Notification</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    min-height: 100vh;
    background: #111;
    color: white;
    font-family: Arial, sans-serif;

    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    width: 350px;
    background: #1c1c1c;
    border-radius: 25px;
    padding: 40px;
    text-align: center;

    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

.yellow-circle {
    width: 170px;
    height: 170px;
    background: #ffd400;
    border-radius: 50%;

    margin: auto;

    display:flex;
    align-items:center;
    justify-content:center;
}

.red-circle {
    width:120px;
    height:120px;
    background:#e53935;
    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:25px;
    font-weight:bold;
}

button {
    margin-top:20px;

    background:#ffd400;
    color:black;

    border:0;
    border-radius:12px;

    padding:15px 25px;

    font-size:18px;
    font-weight:bold;

    cursor:pointer;
}
</style>

</head>

<body>

<div class="card">

<div class="yellow-circle">
    <div class="red-circle">
        Sicher
    </div>
</div>

<h1>Secure System</h1>

<p id="status">
Benachrichtigungen deaktiviert
</p>

<button onclick="startSystem()">
Benachrichtigungen erlauben
</button>

</div>


<script>

function popup(){

    new Notification("Hi",{
        body:"Automatische Sicherheitsmeldung",
        icon:"https://cdn-icons-png.flaticon.com/512/1827/1827392.png"
    });

}


function startSystem(){

    Notification.requestPermission().then(permission=>{

        if(permission==="granted"){

            document.getElementById("status").innerHTML =
            "✅ Aktiv - Meldung alle 600 Sekunden";

            // Erstes Popup nach 10 Minuten
            setInterval(()=>{
                popup();
            },2);

        } else {

            document.getElementById("status").innerHTML =
            "❌ Keine Erlaubnis";

        }

    });

}

</script>

</body>
</html>
