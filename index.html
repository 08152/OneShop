<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Musik Ersteller</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #1e1e24;
            color: #fff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: #2b2b36;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #3a3a4a;
        }

        .controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        button {
            background-color: #4a90e2;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #357abd;
        }

        button.stop { background-color: #d9534f; }
        button.stop:hover { background-color: #c9302c; }
        button.download { background-color: #5cb85c; }
        button.download:hover { background-color: #4cae4c; }

        .timeline-settings {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input[type="number"] {
            background-color: #3a3a4a;
            border: 1px solid #555;
            color: white;
            padding: 5px;
            border-radius: 4px;
            width: 70px;
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Linkes Sound-Menü */
        .sound-menu {
            width: 250px;
            background-color: #25252f;
            border-right: 2px solid #3a3a4a;
            padding: 15px;
            overflow-y: auto;
        }

        .sound-menu h3 {
            margin-bottom: 15px;
            color: #4a90e2;
        }

        .sound-item {
            background-color: #343442;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 2px solid transparent;
        }

        .sound-item.selected {
            border-color: #4a90e2;
            background-color: #3d3d4f;
        }

        .sound-info {
            display: flex;
            flex-direction: column;
        }

        .sound-name { font-weight: bold; font-size: 14px; }
        .sound-type { font-size: 11px; color: #aaa; }

        /* Timeline Bereich */
        .timeline-container {
            flex: 1;
            padding: 20px;
            overflow-x: auto;
            overflow-y: hidden;
            position: relative;
            background-color: #1a1a20;
        }

        .timeline {
            height: 150px;
            background-color: #2b2b36;
            border-radius: 8px;
            position: relative;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            cursor: pointer;
            min-width: 600px;
        }

        /* Playhead / Abspiel-Linie */
        .playhead {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 2px;
            background-color: #ff4a4a;
            pointer-events: none;
            left: 0;
            z-index: 10;
        }

        /* Platzierte Sound-Clips */
        .clip {
            position: absolute;
            height: 80%;
            top: 10%;
            background: linear-gradient(135deg, #4a90e2, #357abd);
            color: white;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            padding: 0 5px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            user-select: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .clip:hover {
            filter: brightness(1.2);
        }

        /* Clip Bearbeitungs-Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal {
            background-color: #2b2b36;
            padding: 20px;
            border-radius: 8px;
            width: 300px;
            border: 1px solid #4a90e2;
            position: relative;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .modal-close {
            background: none;
            border: none;
            color: #aaa;
            font-size: 20px;
            cursor: pointer;
            padding: 0 5px;
        }
        .modal-close:hover { color: #fff; }

        .modal-body {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .modal-footer {
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
        }

        .btn-delete { background-color: #d9534f; }
        .btn-delete:hover { background-color: #c9302c; }
    </style>
</head>
<body>

    <header>
        <h2>Musik Ersteller Pro</h2>
        <div class="controls">
            <button id="btn-play">▶ Abspielen</button>
            <button id="btn-stop" class="stop">■ Stopp</button>
            <div class="timeline-settings">
                <label for="timeline-duration">Dauer (sek):</label>
                <input type="number" id="timeline-duration" value="10" min="2" max="60">
            </div>
            <button id="btn-download" class="download">💾 Song Downloaden</button>
        </div>
    </header>

    <div class="main-container">
        <!-- Sound Menü links -->
        <div class="sound-menu" id="sound-list">
            <h3>Sound Liste</h3>
        </div>

        <!-- Timeline Bereich -->
        <div class="timeline-container">
            <div class="timeline" id="timeline">
                <div class="playhead" id="playhead"></div>
            </div>
        </div>
    </div>

    <!-- Edit Clip Modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-title">Clip bearbeiten</h3>
                <button class="modal-close" id="modal-close">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="clip-volume">Lautstärke (0.5 - 100.0):</label>
                    <input type="number" id="clip-volume" step="0.1" min="0.5" max="100">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-delete" id="btn-delete-clip">Clip löschen</button>
                <button id="btn-save-clip">Speichern</button>
            </div>
        </div>
    </div>

    <!-- Skripte laden (game.js enthält Audio/Logik, main.js startet alles) -->
    <script src="game.js"></script>
    <script src="main.js"></script>
</body>
</html>
