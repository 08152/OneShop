<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiniKI Login</title>

<style>
body{
    margin:0;
    padding:0;
    font-family:Arial,sans-serif;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login{
    width:340px;
    background:#ffffff;
    border-radius:12px;
    padding:25px;
    box-shadow:0 5px 20px rgba(0,0,0,.15);
    text-align:center;
}

h1{
    margin-top:0;
    color:#222;
}

input{
    width:100%;
    padding:12px;
    font-size:16px;
    border:1px solid #ccc;
    border-radius:8px;
    margin-top:15px;
    box-sizing:border-box;
}

button{
    width:100%;
    margin-top:15px;
    padding:12px;
    font-size:16px;
    border:none;
    border-radius:8px;
    background:#000;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#333;
}

#error{
    color:red;
    margin-top:12px;
}
</style>

</head>
<body>

<div class="login">

<h1>MiniKI</h1>

<p>Bitte PIN eingeben</p>

<input
type="password"
id="pin"
placeholder="PIN eingeben"
autocomplete="off">

<button onclick="login()">
Anmelden
</button>

<p id="error"></p>

</div>

<script>

const PIN = "081508151235180Rss#";

function login(){

    const eingabe = document.getElementById("pin").value;

    if(eingabe === PIN){

        window.location.href = "chat.html";

    }else{

        document.getElementById("error").textContent = "Falscher PIN.";

    }

}

document.getElementById("pin").addEventListener("keydown",function(e){

    if(e.key==="Enter"){

        login();

    }

});

</script>

</body>
</html>
