<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>RiskyTube Pro</title>

<style>
body{
    margin:0;
    background:#0b1220;
    color:white;
    font-family:Arial;
}

header{
    padding:20px;
    background:#111827;
    font-size:28px;
    font-weight:bold;
    color:#ef4444;
}

.account{
    margin:40px auto;
    width:300px;
    background:#1f2937;
    border-radius:20px;
    padding:25px;
    text-align:center;
    cursor:pointer;
}

.account img{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
}

.account:hover{
    background:#374151;
}

.banner{
    padding:30px;
    background:#111827;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:#1f2937;
    border-radius:15px;
    overflow:hidden;
    cursor:pointer;
}

.card video{
    width:100%;
    height:170px;
    object-fit:cover;
}

.text{
    padding:15px;
}

.player{
    display:none;
    padding:20px;
}

iframe{
    width:100%;
    height:70vh;
    border:0;
}

button{
    padding:10px 20px;
    border:0;
    border-radius:20px;
    cursor:pointer;
}
</style>

</head>

<body>

<header>
RiskyTube
</header>


<!-- ACCOUNT AUSWAHL -->

<div id="accounts">

<div class="account" onclick="openChannel()">

<img src="1.png">

<h2>RiskyLife</h2>

<p>Gaming • Musik • Videos</p>

</div>

</div>



<!-- KANAL -->

<div id="channel" style="display:none">

<div class="banner">

<h1>RiskyLife</h1>

<p>
Willkommen auf meinem Kanal!
</p>

</div>


<div id="videos" class="grid"></div>

</div>



<!-- VIDEO PLAYER -->

<div id="player" class="player">

<button onclick="back()">
← Zurück
</button>

<br><br>

<iframe id="video" allowfullscreen></iframe>

<h2 id="title"></h2>

<p id="description"></p>

</div>



<script>

let data;


fetch("1.json")
.then(r=>r.json())
.then(j=>{
    data=j;
});



function openChannel(){

document.getElementById("accounts").style.display="none";

document.getElementById("channel").style.display="block";


let box=document.getElementById("videos");

box.innerHTML="";


data.videos.forEach((v,i)=>{


let card=document.createElement("div");

card.className="card";


card.innerHTML=`

<video muted src="${v.file}"></video>

<div class="text">

<b>${v.title}</b>

<p>${v.description}</p>

</div>

`;


card.onclick=()=>play(i);


box.appendChild(card);


});


}



function play(i){

let v=data.videos[i];

let url=v.file;


// YouTube Unterstützung

if(url.includes("watch?v=")){

url=url.replace(
"watch?v=",
"embed/"
);

}


// Google Drive Unterstützung

if(url.includes("uc?export=download&id=")){

let id=url.split("id=")[1];

url=
"https://drive.google.com/file/d/"
+id+
"/preview";

}



document.getElementById("channel").style.display="none";

document.getElementById("player").style.display="block";


document.getElementById("video").src=url;

document.getElementById("title").innerHTML=v.title;

document.getElementById("description").innerHTML=v.description;


}



function back(){

document.getElementById("video").src="";

document.getElementById("player").style.display="none";

document.getElementById("channel").style.display="block";

}


</script>

</body>
</html>
