<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Video Kompressor</title>
<style>
body{
    font-family:Arial;
    background:#111;
    color:white;
    text-align:center;
    padding:30px;
}
.box{
    background:#222;
    padding:25px;
    border-radius:15px;
    max-width:500px;
    margin:auto;
}
button{
    padding:12px 20px;
    margin:10px;
    border:0;
    border-radius:8px;
    cursor:pointer;
}
input{
    padding:10px;
    margin:10px;
}
#status{
    margin-top:20px;
}
</style>
</head>

<body>

<div class="box">

<h1>🎬 Video Kompressor</h1>

<input type="file" id="video" accept="video/*">

<br>

<label>
Zielgröße MB:
</label>

<input id="size" value="24.5" type="number">

<br>

<button onclick="compress()">
Komprimieren
</button>

<p id="status">
Bereit
</p>

<a id="download" style="display:none;color:#4af">
Download
</a>

</div>


<script type="module">

import {FFmpeg} 
from "https://unpkg.com/@ffmpeg/ffmpeg@0.12.6/dist/esm/index.js";

import {fetchFile}
from "https://unpkg.com/@ffmpeg/util@0.12.1/dist/esm/index.js";


const ffmpeg = new FFmpeg();


const status =
document.getElementById("status");


async function loadFFmpeg(){

if(!ffmpeg.loaded){

status.innerHTML="FFmpeg wird geladen...";

await ffmpeg.load({
coreURL:
"https://unpkg.com/@ffmpeg/core@0.12.6/dist/esm/ffmpeg-core.js"
});

status.innerHTML="FFmpeg bereit";

}

}



window.compress = async function(){


const file =
document.getElementById("video").files[0];


if(!file){
alert("Bitte Video auswählen");
return;
}


await loadFFmpeg();


let target =
Number(document.getElementById("size").value);



status.innerHTML=
"Video wird analysiert...";


const input="input.mp4";
const output="compressed.mp4";


await ffmpeg.writeFile(
input,
await fetchFile(file)
);



let durationGuess =
file.size / (1024*1024);



let bitrate =
(target*8*1024*1024)/60;



status.innerHTML=
"Komprimierung läuft...";



await ffmpeg.exec([

"-i",
input,

"-c:v",
"libx264",

"-b:v",
Math.floor(bitrate).toString(),

"-preset",
"medium",

"-c:a",
"aac",

output

]);



const data =
await ffmpeg.readFile(output);



const blob =
new Blob(
[data.buffer],
{type:"video/mp4"}
);


const url =
URL.createObjectURL(blob);



const link =
document.getElementById("download");


link.href=url;
link.download="komprimiert.mp4";
link.style.display="block";
link.innerHTML=
"⬇️ Video herunterladen";


status.innerHTML=
"Fertig!";


}



</script>

</body>
</html>
