<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GhostBay - Marktplatz</title>

<style>
body{
    margin:0;
    background:#050505;
    color:white;
    font-family:Arial;
}

header{
    background:#111;
    padding:20px;
    border-bottom:3px solid #ffd400;
}

.logo{
    font-size:30px;
    font-weight:bold;
    color:#ffd400;
}

.search{
    margin-top:15px;
}

input{
    width:80%;
    padding:12px;
    border-radius:8px;
    border:none;
    font-size:16px;
}

button{
    background:#ffd400;
    border:none;
    padding:12px;
    border-radius:8px;
    cursor:pointer;
}

.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:#111;
    border:1px solid #333;
    border-radius:15px;
    padding:15px;
    box-shadow:0 0 15px #000;
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:10px;
}

.title{
    color:#ffd400;
    font-size:22px;
}

.price{
    font-size:20px;
    margin:10px 0;
}

.copy{
    width:100%;
}
</style>
</head>


<body>

<header>

<div class="logo">
🛒 GhostBay
</div>

<div class="search">
<input id="search" placeholder="Artikel suchen..." onkeyup="searchItems()">
</div>

</header>


<div class="container" id="items"></div>



<script>


/*
=================================================
NEUE ARTIKEL HINZUFÜGEN:

Einfach diese Zeile kopieren:

{
bild:"BILD_LINK",
titel:"ARTIKEL NAME",
preis:"99 €",
kontakt:"deine@email.de"
},

=================================================
*/


let artikel=[


{
bild:"1.png",
titel:"Star Wars Mystery Box",
preis:"1€",
kontakt:"r.schmid.8321@gmail.com"
},

];



function anzeigen(liste=artikel){

let box=document.getElementById("items");

box.innerHTML="";


liste.forEach((a)=>{

box.innerHTML+=`

<div class="card">

<img src="${a.bild}">

<div class="title">
${a.titel}
</div>

<div class="price">
${a.preis}
</div>


<button class="copy"
onclick="copyText('${a.kontakt}')">

📋 Kontakt kopieren

</button>


</div>

`;

});


}



function searchItems(){

let text=document
.getElementById("search")
.value
.toLowerCase();


let ergebnis=artikel.filter(a=>

a.titel.toLowerCase()
.includes(text)

);


anzeigen(ergebnis);

}



function copyText(text){

navigator.clipboard.writeText(text);

alert("Kontakt kopiert: "+text);

}



anzeigen();


</script>


</body>
</html>
