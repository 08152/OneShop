<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GhostChat</title>


<style>

body {

    margin:0;
    font-family:Arial, sans-serif;
    background:#111;
    color:white;

}


.app {

    display:flex;
    height:100vh;

}



/* Linke Seite */

.sidebar {

    width:260px;
    background:#202020;
    padding:20px;
    box-sizing:border-box;

}


.logo {

    font-size:25px;
    font-weight:bold;
    margin-bottom:20px;

}


input {

    width:100%;
    padding:12px;
    margin-top:10px;
    box-sizing:border-box;

    border:none;
    border-radius:8px;

}


button {

    width:100%;
    padding:12px;
    margin-top:10px;

    background:#25d366;
    border:none;
    border-radius:8px;

    cursor:pointer;

    font-weight:bold;

}


#users {

    margin-top:20px;

}




/* Chat */

.chat {

    flex:1;
    display:flex;
    flex-direction:column;

}


.header {

    background:#075e54;
    padding:20px;
    font-size:20px;

}


#messages {

    flex:1;
    padding:20px;
    overflow:auto;

}



.message {

    background:#075e54;
    padding:10px;
    margin:10px;

    border-radius:10px;

    max-width:300px;

}



.send {

    display:flex;
    padding:15px;
    background:#202020;

}


.send input {

    flex:1;
    margin:0;

}


.send button {

    width:60px;
    margin-left:10px;

}


</style>

</head>



<body>


<div class="app">


<div class="sidebar">


<div class="logo">
💬 GhostChat
</div>


<input id="username" placeholder="Name">


<button onclick="join()">
Start
</button>


<h3>Online:</h3>


<div id="users">
Keine Nutzer
</div>


</div>




<div class="chat">


<div class="header">

Allgemeiner Chat

</div>


<div id="messages"></div>



<div class="send">

<input 
id="text"
placeholder="Nachricht..."
>


<button onclick="send()">
➤
</button>


</div>


</div>



</div>



<script src="/socket.io/socket.io.js"></script>


<script>


const socket = io();


let name = "";



function join(){

    name =
    document.getElementById("username").value;


    if(name.trim()=="") return;


    socket.emit(
        "join",
        name
    );

}



function send(){

    let text =
    document.getElementById("text").value;


    if(text.trim()=="") return;


    socket.emit(
        "message",
        text
    );


    document.getElementById("text").value="";

}




socket.on("message",(msg)=>{


let box =
document.getElementById("messages");


box.innerHTML += `

<div class="message">

<b>${msg.user}</b><br>

${msg.text}

<br>

<small>${msg.time}</small>

</div>

`;


box.scrollTop =
box.scrollHeight;


});




socket.on("users",(users)=>{


document.getElementById("users").innerHTML =

users.map(
u=>"👤 "+u.name
).join("<br>");



});


</script>



</body>

</html>
