<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GhostOS Desktop</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Arial,sans-serif;
}

body{
width:100vw;
height:100vh;
overflow:hidden;

background-image:url("https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1920&q=80");
background-size:cover;
background-position:center;

display:flex;
flex-direction:column;
justify-content:flex-end;
}

/* Desktop */

.desktop{
position:absolute;
inset:0;
padding:30px;
}

/* Dock */

.dock{
height:62px;
width:100%;

background:rgba(255,255,255,.22);

backdrop-filter:blur(25px);
-webkit-backdrop-filter:blur(25px);

border-top:1px solid rgba(255,255,255,.3);

display:flex;
align-items:center;
justify-content:space-between;

padding:0 15px;

z-index:1000;
}

/* Launcher */

.launcher{
width:42px;
height:42px;

border-radius:50%;

background:white;

display:flex;
justify-content:center;
align-items:center;

cursor:pointer;

box-shadow:0 5px 15px rgba(0,0,0,.25);
}

.launcher:before{
content:"";
width:20px;
height:20px;
border-radius:50%;
border:4px solid #4285f4;
}

/* Apps */

.apps{
display:flex;
gap:10px;
align-items:center;
}

.app{
width:50px;
height:50px;

background:rgba(255,255,255,.5);

border-radius:16px;

display:flex;
justify-content:center;
align-items:center;

cursor:pointer;

transition:.2s;

box-shadow:0 5px 15px rgba(0,0,0,.2);
}

.app:hover{
transform:translateY(-5px) scale(1.08);
}

.app img{
width:30px;
height:30px;
}

/* Status */

.status{
background:rgba(255,255,255,.35);

padding:8px 15px;

border-radius:20px;

display:flex;
align-items:center;
gap:12px;

backdrop-filter:blur(20px);

color:white;
font-weight:600;

box-shadow:0 5px 15px rgba(0,0,0,.2);
}

.status svg{
width:16px;
height:16px;
fill:white;
}

/* Menu */

.menu{
position:absolute;
bottom:80px;
left:15px;

width:350px;
height:450px;

background:rgba(255,255,255,.2);

backdrop-filter:blur(30px);

border-radius:25px;

padding:20px;

display:none;

color:white;

box-shadow:0 20px 40px rgba(0,0,0,.3);
}

.menu.active{
display:block;
}

.search{
width:100%;
padding:12px;

border:none;
outline:none;

border-radius:14px;

background:rgba(255,255,255,.2);
color:white;
}

.search::placeholder{
color:white;
}

.grid{
margin-top:20px;

display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
}

.grid .app{
width:65px;
height:65px;
margin:auto;
}

/* Notification */

.notification{
position:absolute;
right:20px;
bottom:90px;

width:320px;

background:rgba(255,255,255,.25);

backdrop-filter:blur(20px);

padding:15px;

border-radius:18px;

color:white;

box-shadow:0 10px 25px rgba(0,0,0,.3);

display:none;
}

.notification.show{
display:block;
animation:slide .4s ease;
}

@keyframes slide{
from{
transform:translateX(100px);
opacity:0;
}
to{
transform:translateX(0);
opacity:1;
}
}
</style>
</head>
<body>

<div class="desktop"></div>

<div class="menu" id="menu">

<input class="search" placeholder="Apps suchen...">

<div class="grid">

<div class="app"><img src="https://www.google.com/s2/favicons?sz=64&domain=google.com"></div>

<div class="app"><img src="https://www.google.com/s2/favicons?sz=64&domain=youtube.com"></div>

<div class="app"><img src="https://www.google.com/s2/favicons?sz=64&domain=gmail.com"></div>

<div class="app"><img src="https://www.google.com/s2/favicons?sz=64&domain=spotify.com"></div>

<div class="app"><img src="https://www.google.com/s2/favicons?sz=64&domain=discord.com"></div>

<div class="app"><img src="https://www.google.com/s2/favicons?sz=64&domain=github.com"></div>

<div class="app"><img src="https://www.google.com/s2/favicons?sz=64&domain=drive.google.com"></div>

<div class="app"><img src="https://www.google.com/s2/favicons?sz=64&domain=photos.google.com"></div>

</div>

</div>

<div class="notification" id="notify">
🔔 Willkommen bei GhostOS
</div>

<div class="dock">

<div class="launcher" id="launcher"></div>

<div class="apps">

<div class="app"><img src="https://www.google.com/s2/favicons?sz=64&domain=google.com"></div>

<div class="app"><img src="https://www.google.com/s2/favicons?sz=64&domain=youtube.com"></div>

<div class="app"><img src="https://www.google.com/s2/favicons?sz=64&domain=gmail.com"></div>

<div class="app"><img src="https://www.google.com/s2/favicons?sz=64&domain=spotify.com"></div>

<div class="app"><img src="https://www.google.com/s2/favicons?sz=64&domain=github.com"></div>

</div>

<div class="status">

<svg viewBox="0 0 24 24">
<path d="M2 18h2c3 0 5-2 5-5s-2-5-5-5H2v2h2c2 0 3 1 3 3s-1 3-3 3H2z"/>
</svg>

<svg viewBox="0 0 24 24">
<path d="M3 6h18v12H3z"/>
</svg>

<span id="clock">00:00</span>

</div>

</div>

<script>

function updateClock(){

const now=new Date();

const h=String(now.getHours()).padStart(2,"0");
const m=String(now.getMinutes()).padStart(2,"0");

document.getElementById("clock").textContent=h+":"+m;

}

setInterval(updateClock,1000);
updateClock();

const launcher=document.getElementById("launcher");
const menu=document.getElementById("menu");

launcher.onclick=()=>{

menu.classList.toggle("active");

};

const notify=document.getElementById("notify");

setTimeout(()=>{

notify.classList.add("show");

},1000);

setTimeout(()=>{

notify.classList.remove("show");

},6000);

</script>

</body>
</html>
