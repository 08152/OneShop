<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BeatAI Offline</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial;
}

header{
    padding:25px;
    text-align:center;
    font-size:35px;
    font-weight:bold;
    background:linear-gradient(90deg,#ffcc00,#ff6600);
    color:#111;
}

.app{
    max-width:800px;
    margin:auto;
    padding:25px;
}

.card{
    background:#1d1d1d;
    border-radius:20px;
    padding:25px;
    margin-top:20px;
}

button{
    background:#ffcc00;
    border:0;
    padding:15px 25px;
    border-radius:15px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#ffaa00;
}

select,input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
}

.result{
    background:#000;
    padding:20px;
    border-radius:15px;
    margin-top:20px;
}
</style>
</head>


<body>

<header>
🎵 BeatAI Offline
</header>


<div class="app">

<div class="card">

<h2>🎤 Song erstellen</h2>

<label>Stil</label>
<select id="style">
<option>Pop</option>
<option>Rock</option>
<option>Gaming</option>
<option>Horror</option>
<option>Epic</option>
</select>


<label>Instrumente aus daten</label>

<select id="instrument">
<option>Trommel</option>
<option>Gitarre</option>
</select>


<button onclick="createSong()">
✨ Musik generieren
</button>

</div>


<div class="card">

<h2>📂 Daten</h2>

<p>
Ordner:
<b>/daten</b>
</p>

<p>
Geladene Instrumente:
</p>

<ul>
<li>🥁 trommel</li>
<li>🎸 gitarre</li>
</ul>

</div>


<div class="result" id="output">
Noch kein Song erstellt...
</div>


</div>


<script>

let daten={
"Trommel":"trommel",
"Gitarre":"gitarre"
};


function createSong(){

let style=document.getElementById("style").value;
let instrument=document.getElementById("instrument").value;


let datei=daten[instrument];


document.getElementById("output").innerHTML=
`
<h2>🎶 Song erstellt</h2>

<p>Genre: ${style}</p>

<p>Instrument:
<b>${instrument}</b>
</p>

<p>
KI nutzt Daten:
<br>
📁 daten/${datei}
</p>

<hr>

🎵 Intro:
${instrument} startet...

<br><br>

🥁 Rhythmus wird erstellt...

<br><br>

🎤 Melodie wird generiert...

<br><br>

✅ Fertig!
`;

}

</script>

</body>
</html>
