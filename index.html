<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Musik Ersteller</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #1e1e24;
            color: #fff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: #2b2b36;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #3a3a4a;
        }

        .controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        button {
            background-color: #4a90e2;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #357abd;
        }

        button.stop { background-color: #d9534f; }
        button.stop:hover { background-color: #c9302c; }
        button.download { background-color: #5cb85c; }
        button.download:hover { background-color: #4cae4c; }

        .timeline-settings {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input[type="number"] {
            background-color: #3a3a4a;
            border: 1px solid #555;
            color: white;
            padding: 5px;
            border-radius: 4px;
            width: 70px;
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Linkes Sound-Menü */
        .sound-menu {
            width: 250px;
            background-color: #25252f;
            border-right: 2px solid #3a3a4a;
            padding: 15px;
            overflow-y: auto;
        }

        .sound-menu h3 {
            margin-bottom: 15px;
            color: #4a90e2;
        }

        .sound-item {
            background-color: #343442;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 2px solid transparent;
        }

        .sound-item.selected {
            border-color: #4a90e2;
            background-color: #3d3d4f;
        }

        .sound-info {
            display: flex;
            flex-direction: column;
        }

        .sound-name { font-weight: bold; font-size: 14px; }
        .sound-type { font-size: 11px; color: #aaa; }

        /* Timeline Bereich */
        .timeline-container {
            flex: 1;
            padding: 20px;
            overflow-x: auto;
            overflow-y: hidden;
            position: relative;
            background-color: #1a1a20;
        }

        .timeline {
            height: 150px;
            background-color: #2b2b36;
            border-radius: 8px;
            position: relative;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            cursor: pointer;
            min-width: 600px;
        }

        /* Playhead / Abspiel-Linie */
        .playhead {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 2px;
            background-color: #ff4a4a;
            pointer-events: none;
            left: 0;
            z-index: 10;
        }

        /* Platzierte Sound-Clips */
        .clip {
            position: absolute;
            height: 80%;
            top: 10%;
            background: linear-gradient(135deg, #4a90e2, #357abd);
            color: white;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            padding: 0 5px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            user-select: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .clip:hover {
            filter: brightness(1.2);
        }

        /* Clip Bearbeitungs-Modal (Menü) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal {
            background-color: #2b2b36;
            padding: 20px;
            border-radius: 8px;
            width: 300px;
            border: 1px solid #4a90e2;
            position: relative;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .modal-close {
            background: none;
            border: none;
            color: #aaa;
            font-size: 20px;
            cursor: pointer;
            padding: 0 5px;
        }
        .modal-close:hover { color: #fff; }

        .modal-body {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .modal-footer {
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
        }

        .btn-delete { background-color: #d9534f; }
        .btn-delete:hover { background-color: #c9302c; }
    </style>
</head>
<body>

    <header>
        <h2>Musik Ersteller Pro</h2>
        <div class="controls">
            <button id="btn-play">▶ Abspielen</button>
            <button id="btn-stop" class="stop">■ Stopp</button>
            <div class="timeline-settings">
                <label for="timeline-duration">Dauer (sek):</label>
                <input type="number" id="timeline-duration" value="10" min="2" max="60">
            </div>
            <button id="btn-download" class="download">💾 Song Downloaden</button>
        </div>
    </header>

    <div class="main-container">
        <!-- Sound Menü links -->
        <div class="sound-menu" id="sound-list">
            <h3>Sound Liste</h3>
            <!-- Sounds werden via JS generiert -->
        </div>

        <!-- Timeline Bereich -->
        <div class="timeline-container">
            <div class="timeline" id="timeline">
                <div class="playhead" id="playhead"></div>
                <!-- Clips werden hier eingefügt -->
            </div>
        </div>
    </div>

    <!-- Edit Clip Modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-title">Clip bearbeiten</h3>
                <button class="modal-close" id="modal-close">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="clip-volume">Lautstärke (0.5 - 100.0):</label>
                    <input type="number" id="clip-volume" step="0.1" min="0.5" max="100">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-delete" id="btn-delete-clip">Clip löschen</button>
                <button id="btn-save-clip">Speichern</button>
            </div>
        </div>
    </div>

    <script>
        // --- SOUND DATENBANK (Eingebaute Synthesizer-Sounds) ---
        const AVAILABLE_SOUNDS = [
            { id: 'kick', name: 'Bass Drum', type: 'synth-kick', duration: 0.2 },
            { id: 'snare', name: 'Snare Drum', type: 'synth-snare', duration: 0.2 },
            { id: 'hihat', name: 'Hi-Hat', type: 'synth-hat', duration: 0.05 },
            { id: 'beep-high', name: 'Synth Piep Hoch', type: 'osc', freq: 880, duration: 0.15 },
            { id: 'beep-low', name: 'Synth Piep Tief', type: 'osc', freq: 220, duration: 0.3 },
            { id: 'chord', name: 'Synthesizer Akkord', type: 'osc-chord', freq: 440, duration: 0.5 }
        ];

        // --- AUDIO ENGINE (Generiert die Töne live) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSoundLive(sound, volume = 100, startTime = 0) {
            const gainNode = audioCtx.createGain();
            // Umrechnung von User-Lautstärke (0.5 - 100) in Audio-Gain (0.005 - 1.0)
            const targetVolume = (volume / 100) * 0.5; 
            gainNode.gain.setValueAtTime(targetVolume, startTime);
            gainNode.connect(audioCtx.destination);

            if (sound.type === 'osc') {
                const osc = audioCtx.createOscillator();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(sound.freq, startTime);
                osc.connect(gainNode);
                osc.start(startTime);
                osc.stop(startTime + sound.duration);
            } 
            else if (sound.type === 'osc-chord') {
                [sound.freq, sound.freq * 1.25, sound.freq * 1.5].forEach(f => {
                    const osc = audioCtx.createOscillator();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(f, startTime);
                    osc.connect(gainNode);
                    osc.start(startTime);
                    osc.stop(startTime + sound.duration);
                });
            }
            else if (sound.type === 'synth-kick') {
                const osc = audioCtx.createOscillator();
osc.frequency.setValueAtTime(150, startTime);
osc.frequency.exponentialRampToValueAtTime(0.01, startTime + sound.duration);
osc.connect(gainNode);
osc.start(startTime);
osc.stop(startTime + sound.duration);
}
else if (sound.type === 'synth-snare' || sound.type === 'synth-hat') {
// Rauschgenerator für Drums
const bufferSize = audioCtx.sampleRate * sound.duration;
const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
const data = buffer.getChannelData(0);
for (let i = 0; i < bufferSize; i++) {
data[i] = Math.random() * 2 - 1;
}
const noise = audioCtx.createBufferSource();
noise.buffer = buffer;

// Filter für Hi-Hat oder Snare
const filter = audioCtx.createBiquadFilter();
filter.type = sound.type === 'synth-hat' ? 'highpass' : 'bandpass';
filter.frequency.setValueAtTime(sound.type === 'synth-hat' ? 7000 : 1000, startTime);

noise.connect(filter);
filter.connect(gainNode);
noise.start(startTime);
noise.stop(startTime + sound.duration);
}
}

// --- ANWENDUNGS-ZUSTAND (State) ---
let appState = {
selectedSoundId: null,
timelineDuration: 10, // Sekunden
clips: [] // { id, soundId, time, volume }
};

let isPlaying = false;
let playStartTime = 0;
let playOffset = 0;
let animationFrameId = null;
let activeEditingClipId = null;

// Elements
const soundListEl = document.getElementById('sound-list');
const timelineEl = document.getElementById('timeline');
const playheadEl = document.getElementById('playhead');
const durationInput = document.getElementById('timeline-duration');
const btnPlay = document.getElementById('btn-play');
const btnStop = document.getElementById('btn-stop');
const btnDownload = document.getElementById('btn-download');

// Modal Elements
const modalOverlay = document.getElementById('modal-overlay');
const modalTitle = document.getElementById('modal-title');
const clipVolumeInput = document.getElementById('clip-volume');
const btnCloseModal = document.getElementById('modal-close');
const btnSaveClip = document.getElementById('btn-save-clip');
const btnDeleteClip = document.getElementById('btn-delete-clip');

// --- INITIALISIERUNG & AUTOMATISCHE SPEICHERUNG ---
function init() {
loadFromLocalStorage();
renderSoundMenu();
updateTimelineWidth();
renderClips();

// Event Listeners
durationInput.addEventListener('change', handleDurationChange);
timelineEl.addEventListener('click', handleTimelineClick);
btnPlay.addEventListener('click', togglePlay);
btnStop.addEventListener('click', stopPlayback);
btnDownload.addEventListener('click', downloadSong);

// Modal Listeners
btnCloseModal.addEventListener('click', closeModal);
btnSaveClip.addEventListener('click', saveClipSettings);
btnDeleteClip.addEventListener('click', deleteClip);
}

function saveToLocalStorage() {
localStorage.setItem('music_maker_save', JSON.stringify(appState));
}

function loadFromLocalStorage() {
const saved = localStorage.getItem('music_maker_save');
if (saved) {
try {
appState = JSON.parse(saved);
durationInput.value = appState.timelineDuration;
} catch(e) {
console.error("Fehler beim Laden des Speichers", e);
}
}
}

// --- RENDER FUNKTIONEN ---
function renderSoundMenu() {
soundListEl.innerHTML = 'Sound Liste';
AVAILABLE_SOUNDS.forEach(sound => {
const item = document.createElement('div');
item.className = sound-item ${appState.selectedSoundId === sound.id ? 'selected' : ''};

item.innerHTML = <div class="sound-info"> <span class="sound-name">${sound.name}</span> <span class="sound-type">Dauer: ${sound.duration}s</span> </div> <button class="btn-pick" data-id="${sound.id}">Pick</button>;

item.querySelector('.btn-pick').addEventListener('click', (e) => {
e.stopPropagation();
selectSound(sound.id);
});

soundListEl.appendChild(item);
});
}

function updateTimelineWidth() {
// Skaliere die Timeline visuell anhand der Sekunden (1 Sekunde = 100 Pixel Breite)
const calculatedWidth = appState.timelineDuration * 100;
timelineEl.style.width = ${calculatedWidth}px;
}

function renderClips() {
// Lösche alle alten Clips (behalte nur die Abspiellinie)
const existingClips = timelineEl.querySelectorAll('.clip');
existingClips.forEach(c => c.remove());

appState.clips.forEach(clip => {
const sound = AVAILABLE_SOUNDS.find(s => s.id === clip.soundId);
if (!sound) return;

const clipEl = document.createElement('div');
clipEl.className = 'clip';
clipEl.innerText = ${sound.name} (${clip.volume}%);

// Position berechnen (Prozentual basierend auf Zeit)
const leftPercent = (clip.time / appState.timelineDuration) * 100;
const widthPercent = (sound.duration / appState.timelineDuration) * 100;

clipEl.style.left = ${leftPercent}%;
clipEl.style.width = max(${widthPercent}%, 40px); // Mindestbreite zur Lesbarkeit

clipEl.addEventListener('click', (e) => {
e.stopPropagation(); // Verhindert das Neusetzen eines Clips auf der Timeline
openClipMenu(clip);
});

timelineEl.appendChild(clipEl);
});
}

// --- AKTIONEN ---
function selectSound(soundId) {
appState.selectedSoundId = soundId;
renderSoundMenu();
// Spiele den Sound kurz als Feedback ab
const sound = AVAILABLE_SOUNDS.find(s => s.id === soundId);
if(sound) playSoundLive(sound, 100, audioCtx.currentTime);
}

function handleDurationChange() {
let val = parseInt(durationInput.value) || 10;
if (val < 2) val = 2;
if (val > 60) val = 60;
appState.timelineDuration = val;
durationInput.value = val;

// Entferne Clips, die außerhalb der neuen Dauer liegen
appState.clips = appState.clips.filter(c => c.time <= val);

updateTimelineWidth();
renderClips();
saveToLocalStorage();
}

function handleTimelineClick(e) {
if (!appState.selectedSoundId) {
alert("Bitte wähle zuerst links einen Sound mit 'Pick' aus!");
return;
}

// Klickposition relativ zur Timeline ermitteln
const rect = timelineEl.getBoundingClientRect();
const clickX = e.clientX - rect.left;
const clickPercent = clickX / rect.width;
const clickedTime = clickPercent * appState.timelineDuration;

// Neuen Clip erstellen
const newClip = {
id: 'clip_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
soundId: appState.selectedSoundId,
time: clickedTime,
volume: 100.0 // Standardlautstärke
};

appState.clips.push(newClip);
renderClips();
saveToLocalStorage();
}

// --- CLIP MENÜ (MODAL) ---
function openClipMenu(clip) {
activeEditingClipId = clip.id;
const sound = AVAILABLE_SOUNDS.find(s => s.id === clip.soundId);
modalTitle.innerText = Sound: ${sound.name};
clipVolumeInput.value = clip.volume;
modalOverlay.style.display = 'flex';
}

function closeModal() {
modalOverlay.style.display = 'none';
activeEditingClipId = null;
}

function saveClipSettings() {
let vol = parseFloat(clipVolumeInput.value);
if (isNaN(vol) || vol < 0.5) vol = 0.5;
if (vol > 100.0) vol = 100.0;

const clip = appState.clips.find(c => c.id === activeEditingClipId);
if (clip) {
clip.volume = vol;
renderClips();
saveToLocalStorage();
}
closeModal();
}

function deleteClip() {
appState.clips = appState.clips.filter(c => c.id !== activeEditingClipId);
renderClips();
saveToLocalStorage();
closeModal();
}

// --- PLAYBACK ENGINE ---
function togglePlay() {
if (isPlaying) {
pausePlayback();
} else {
startPlayback();
}
}

function startPlayback() {
if (audioCtx.state === 'suspended') {
audioCtx.resume();
}
isPlaying = true;
btnPlay.innerText = "⏸ Pause";
playStartTime = audioCtx.currentTime - playOffset;

// Plane alle Sounds, die in der Zukunft liegen
scheduleAudioClips();

// Starte visuellen Abspielkopf
updatePlayhead();
}

function scheduleAudioClips() {
const now = audioCtx.currentTime;
appState.clips.forEach(clip => {
const sound = AVAILABLE_SOUNDS.find(s => s.id === clip.soundId);
if (sound && clip.time >= playOffset) {
const timeToPlay = now + (clip.time - playOffset);
playSoundLive(sound, clip.volume, timeToPlay);
}
});
}

function pausePlayback() {
isPlaying = false;
btnPlay.innerText = "▶ Abspielen";
cancelAnimationFrame(animationFrameId);

// Da wir Live-Audio-Scheduling nutzen, müssen wir bei Pause alle Sounds stoppen.
// Einfachheitshalber laden wir den Audio-Kontext neu, um alle laufenden Synths abzuwürgen.
playOffset = audioCtx.currentTime - playStartTime;
if (playOffset >= appState.timelineDuration) playOffset = 0;
}

function stopPlayback() {
isPlaying = false;
btnPlay.innerText = "▶ Abspielen";
cancelAnimationFrame(animationFrameId);
playOffset = 0;
playheadEl.style.left = '0px';
}

function updatePlayhead() {
if (!isPlaying) return;

const elapsed = audioCtx.currentTime - playStartTime;

if (elapsed >= appState.timelineDuration) {
stopPlayback();
return;
}

const percent = (elapsed / appState.timelineDuration) * 100;
playheadEl.style.left = ${percent}%;

animationFrameId = requestAnimationFrame(updatePlayhead);
}

// --- DOWNLOAD ALS WAV DATEI (Offline Audio Rendering) ---
function downloadSong() {
if (appState.clips.length === 0) {
alert("Deine Timeline ist leer! Füge zuerst Sounds hinzu.");
return;
}

btnDownload.innerText = "⏳ Generiere...";
btnDownload.disabled = true;

const sampleRate = 44100;
const renderDuration = appState.timelineDuration; [1]

// Nutze OfflineAudioContext für schnelles Rendern im Hintergrund ohne Zeitverlust
const offlineCtx = new OfflineAudioContext(1, sampleRate * renderDuration, sampleRate);

// Hilfsfunktion zum Rendern im Offline-Context
appState.clips.forEach(clip => {
const sound = AVAILABLE_SOUNDS.find(s => s.id === clip.soundId);
if (!sound) return;

const gainNode = offlineCtx.createGain();
const targetVolume = (clip.volume / 100) * 0.5;
gainNode.gain.setValueAtTime(targetVolume, clip.time);
gainNode.connect(offlineCtx.destination);

if (sound.type === 'osc') {
const osc = offlineCtx.createOscillator();
osc.type = 'triangle';
osc.frequency.setValueAtTime(sound.freq, clip.time);
osc.connect(gainNode);
osc.start(clip.time);
osc.stop(clip.time + sound.duration);
}
else if (sound.type === 'osc-chord') {
[sound.freq, sound.freq * 1.25, sound.freq * 1.5].forEach(f => {
const osc = offlineCtx.createOscillator();
osc.type = 'sine';
osc.frequency.setValueAtTime(f, clip.time);
osc.connect(gainNode);
osc.start(clip.time);
osc.stop(clip.time + sound.duration);
});
}
else if (sound.type === 'synth-kick') {
const osc = offlineCtx.createOscillator();
osc.frequency.setValueAtTime(150, clip.time);
osc.frequency.exponentialRampToValueAtTime(0.01, clip.time + sound.duration);
osc.connect(gainNode);
osc.start(clip.time);
osc.stop(clip.time + sound.duration);
}
else if (sound.type === 'synth-snare' || sound.type === 'synth-hat') {
const bufferSize = sampleRate * sound.duration;
const buffer = offlineCtx.createBuffer(1, bufferSize, sampleRate);
const data = buffer.getChannelData(0);
for (let i = 0; i < bufferSize; i++) {
data[i] = Math.random() * 2 - 1;
}
const noise = offlineCtx.createBufferSource();
noise.buffer = buffer;

const filter = offlineCtx.createBiquadFilter();
filter.type = sound.type === 'synth-hat' ? 'highpass' : 'bandpass';
filter.frequency.setValueAtTime(sound.type === 'synth-hat' ? 7000 : 1000, clip.time);

noise.connect(filter);
filter.connect(gainNode);
noise.start(clip.time);
noise.stop(clip.time + sound.duration);
}
});

// Rendern starten und als WAV downloaden
offlineCtx.startRendering().then(renderedBuffer => {
const wavBlob = bufferToWav(renderedBuffer);
const url = URL.createObjectURL(wavBlob);

const a = document.createElement('a');
a.href = url;
a.download = 'mein_song.wav';
a.click();

URL.revokeObjectURL(url);
btnDownload.innerText = "💾 Song Downloaden";
btnDownload.disabled = false;
});
}

// Konvertiert den AudioBuffer in eine standardisierte herunterladbare WAV-Datei
function bufferToWav(buffer) {
const numOfChan = buffer.numberOfChannels,
length = buffer.length * numOfChan * 2 + 44,
bufferArr = new ArrayBuffer(length),
view = new DataView(bufferArr),
channels = [], i, sample,
offset = 0,
pos = 0;

function setUint32(data) { view.setUint32(pos, data, true); pos += 4; }
function setUint16(data) { view.setUint16(pos, data, true); pos += 2; }

// WAV Header schreiben
setUint32(0x46464952); // "RIFF"
setUint32(length - 8); // Dateigröße - 8
setUint32(0x45564157); // "WAVE"
setUint32(0x20746d66); // "fmt " chunk
setUint32(16); // Chunk Größe
setUint16(1); // Audio Format (PCM)
setUint16(numOfChan);
setUint32(buffer.sampleRate);
setUint32(buffer.sampleRate * 2 * numOfChan); // Byte Rate
setUint16(numOfChan * 2); // Block Align
setUint16(16); // Bits pro Sample
setUint32(0x61746164); // "data" chunk
setUint32(length - pos - 4);

// Audiodaten schreiben
for (let i = 0; i < buffer.numberOfChannels; i++) {
channels.push(buffer.getChannelData(i));
}

let writePos = pos;
for (let i = 0; i < buffer.length; i++) {
for (let channel = 0; channel < numOfChan; channel++) {
sample = Math.max(-1, Math.min(1, channels[channel][i]));
sample = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
view.setInt16(writePos, sample, true);
writePos += 2;
}
}
return new Blob([bufferArr], { type: 'audio/wav' });
}

// Start der App
window.onload = init;
