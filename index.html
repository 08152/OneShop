<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL // RENDER_LIVE_LOGS</title>
    <style>
        :root {
            --color-bg: #0a0a0a;
            --color-terminal: #00ff33;
            --color-dim: #003300;
            --font-terminal: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--color-bg);
            color: var(--color-terminal);
            font-family: var(--font-terminal);
            margin: 0;
            padding: 20px;
        }

        #terminal {
            max-width: 900px;
            margin: 0 auto;
            border: 1px solid var(--color-terminal);
            padding: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 51, 0.2);
        }

        header {
            border-bottom: 1px dashed var(--color-terminal);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        h1 { font-size: 1.4rem; margin: 0; }
        
        .status-bar {
            font-size: 0.8rem;
            color: #00aa22;
            display: flex;
            justify-content: space-between;
            margin-top: 5px;
        }

        #write-zone {
            display: none;
            margin-bottom: 30px;
            border-bottom: 1px dashed var(--color-dim);
            padding-bottom: 20px;
        }

        .terminal-editor-container {
            position: relative;
            width: 100%;
            min-height: 100px;
            background: #000;
            border: 1px solid var(--color-terminal);
            padding: 10px;
            box-sizing: border-box;
            cursor: text;
        }

        #hidden-textarea {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0;
            cursor: text;
            resize: none;
            border: none;
        }

        #visual-text {
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.5;
            color: var(--color-terminal);
            display: inline;
        }

        /* Fester dicker grüner Balken - kein Blinken, kein Standard-Caret */
        .custom-cursor {
            display: inline-block;
            width: 10px;
            height: 17px;
            background-color: var(--color-terminal);
            vertical-align: middle;
            margin-left: 2px;
        }

        .log-entry {
            border-left: 2px solid var(--color-terminal);
            padding-left: 15px;
            margin-bottom: 25px;
        }

        .log-date { font-weight: bold; color: #fff; margin-bottom: 5px; font-size: 0.9rem; }
        .log-text { line-height: 1.6; white-space: pre-wrap; }

        #auth-zone {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px dashed var(--color-terminal);
        }

        .prompt-line { display: flex; align-items: center; }
        .prompt { color: var(--color-terminal); margin-right: 10px; }
        
        #auth-code {
            background: transparent; border: none; color: var(--color-terminal);
            font-family: var(--font-terminal); font-size: 1rem; width: 100%; outline: none;
            caret-color: var(--color-terminal);
        }

        .sync-indicator { font-size: 0.8rem; color: #ff9900; }
        .online { color: var(--color-terminal); }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

<div id="terminal">
    <header>
        <h1>RENDER_CLOUD_TERMINAL // DIARY_v2.5</h1>
        <div class="status-bar">
            <div>NODE_SERVER: <span id="server-status">WAKING_UP...</span></div>
            <div id="sync-status" class="sync-indicator">BUFFER_LOKAL</div>
        </div>
    </header>

    <!-- Schreibbereich oben -->
    <div id="write-zone">
        <div class="prompt" style="margin-bottom: 5px;">[LIVE_UPLOADER_ACTIVE] INTERFACES_INPUT:</div>
        <div class="terminal-editor-container" onclick="focusEditor()">
            <span id="visual-text"></span><span class="custom-cursor"></span>
            <textarea id="hidden-textarea" oninput="updateText(this.value)" onkeydown="handleKeys(event)"></textarea>
        </div>
        <button onclick="submitLog()" style="background:transparent; border:1px solid var(--color-terminal); color:var(--color-terminal); padding:8px 15px; margin-top:10px; cursor:pointer; font-family:var(--font-terminal);">SUBMIT_TO_CLOUD (STRG+ENTER)</button>
    </div>

    <!-- Logs Verlauf -->
    <main id="log-container">
        <div class="log-entry"><div class="log-text">Verbindung zum Cloud-Server wird aufgebaut... (Falls der Server schläft, kann dies bis zu 50 Sekunden dauern)</div></div>
    </main>

    <!-- Auth unten (wird ausgeblendet) -->
    <div id="auth-zone">
        <div class="prompt-line">
            <span class="prompt">guest@render-node:~# enter_clearance_code:</span>
            <input type="text" id="auth-code" autocomplete="off" onkeydown="checkAuth(event)">
        </div>
    </div>
</div>

<script>
    // DEINE RENDER-URL DIREKT ALS VERBINDUNGSZIEL DEFINIERT
    const RENDER_URL = 'https://onrender.com';
    
    // Erzwingt die Verbindung direkt zu deiner Render-Instanz via Socket.io
    const socket = io(RENDER_URL);
    let isAuthorized = false;

    socket.on('connect', () => {
        document.getElementById('server-status').textContent = "ONLINE";
        document.getElementById('server-status').className = "online";
        syncLocalToServer(); 
    });

    socket.on('disconnect', () => {
        document.getElementById('server-status').textContent = "STANDBY (INACTIVE)";
        document.getElementById('server-status').className = "";
    });

    socket.on('live_type', (data) => {
        let liveDiv = document.getElementById('live-broadcast-preview');
        if (!liveDiv) {
            liveDiv = document.createElement('div');
            liveDiv.id = 'live-broadcast-preview';
            liveDiv.style.border = '1px dashed #ff3333';
            liveDiv.style.padding = '10px';
            liveDiv.style.marginBottom = '20px';
            document.getElementById('log-container').prepend(liveDiv);
        }
        liveDiv.innerHTML = `<div style="color:#ff3333; font-size:0.75rem;">[LIVE_BROADCAST_RECEIVING...]</div><div>${data.text}</div>`;
        if(data.text === "") liveDiv.remove();
    });

    socket.on('update_logs', (logs) => {
        renderLogs(logs);
        const liveDiv = document.getElementById('live-broadcast-preview');
        if(liveDiv) liveDiv.remove();
    });

    function focusEditor() {
        document.getElementById('hidden-textarea').focus();
    }

    function updateText(val) {
        document.getElementById('visual-text').textContent = val;
        localStorage.setItem('diary_current_buffer', val);
        socket.emit('typing', { text: val });
    }

    function handleKeys(e) {
        if (e.ctrlKey && e.key === 'Enter') {
            submitLog();
        }
    }

    function checkAuth(e) {
        if (e.key === 'Enter') {
            const input = document.getElementById('auth-code');
            if (input.value === 'Risky_Live') {
                isAuthorized = true;
                document.getElementById('auth-zone').style.display = 'none';
                document.getElementById('write-zone').style.display = 'block';
                
                const savedBuffer = localStorage.getItem('diary_current_buffer') || "";
                document.getElementById('hidden-textarea').value = savedBuffer;
                updateText(savedBuffer);
                
                focusEditor();
            } else {
                input.value = '';
                alert("ZUGRIFF VERWEIGERT");
            }
        }
    }

    function renderLogs(logs) {
        const container = document.getElementById("log-container");
        container.innerHTML = "";
        if(logs.length === 0) {
            container.innerHTML = `<div class="log-entry"><div class="log-text">[System] Keine Einträge auf der Cloud vorhanden.</div></div>`;
            return;
        }
        logs.forEach(log => {
            container.innerHTML += `
                <div class="log-entry">
                    <div class="log-date">${log.date}</div>
                    <div class="log-text">${log.text}</div>
                </div>`;
        });
    }

    function submitLog() {
        const textarea = document.getElementById('hidden-textarea');
        const text = textarea.value.trim();
        if(!text) return;

        const now = new Date();
        const timestamp = `[ LOG_DATE: ${now.toISOString().split('T')} // ${now.toTimeString().split(' ')} ]`;
        const newLog = { date: timestamp, text: text };

        let offlineQueue = JSON.parse(localStorage.getItem('diary_offline_queue')) || [];
        offlineQueue.push(newLog);
        localStorage.setItem('diary_offline_queue', JSON.stringify(offlineQueue));

        textarea.value = "";
        updateText("");
        localStorage.removeItem('diary_current_buffer');
        socket.emit('typing', { text: "" });

        syncLocalToServer();
    }

    async function syncLocalToServer() {
        let offlineQueue = JSON.parse(localStorage.getItem('diary_offline_queue')) || [];
        if(offlineQueue.length === 0) {
            document.getElementById('sync-status').textContent = "CLOUD_SYNCHRONIZED";
            return;
        }

        document.getElementById('sync-status').textContent = "UPLOADING_BUFFER...";

        try {
            // Verwendet die fest definierte Variable für den Cloud-Sync
            const response = await fetch(`${RENDER_URL}/api/logs/sync`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ entries: offlineQueue })
            });

            if (response.ok) {
localStorage.setItem('diary_offline_queue', JSON.stringify([]));
document.getElementById('sync-status').textContent = "CLOUD_SYNCHRONIZED";
}
} catch (e) {
document.getElementById('sync-status').textContent = "SERVER_STANDBY_LOKAL_SAFE";
}
}
